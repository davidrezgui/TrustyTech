<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلباتي | مدينتنا نظيفة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50; --accent: #FF6F00; --danger: #E53935; --info: #1E88E5; --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F; --radius: 20px; --radius-sm: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 28px rgba(0,0,0,0.12); --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: linear-gradient(160deg, #0d260d 0%, #061406 100%); }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: rgba(30,136,229,0.08); top: -8%; right: -8%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(46,125,50,0.08); bottom: -10%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
        .btn-back { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 15px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .nav-title { flex: 1; font-size: 15px; font-weight: 700; color: white; }
        .main { position: relative; z-index: 1; flex: 1; padding: 74px 14px 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 16px 14px; box-shadow: var(--shadow); margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.12); animation: cardIn 0.5s ease; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .ci-reports { background: #FFEBEE; } .ci-pickups { background: #FFF3E0; }
        .card-label { flex: 1; font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 700; }
        .badge-red { background: #FFEBEE; color: #E53935; } .badge-orange { background: #FFF3E0; color: #E65100; }
        .item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); background: rgba(0,0,0,0.01); margin-bottom: 4px; font-size: 11px; }
        .item-icon { font-size: 22px; }
        .item-info { flex: 1; }
        .item-title { font-weight: 700; color: var(--text-dark); }
        .item-detail { font-size: 10px; color: var(--text-gray); }
        .item-time { font-size: 9px; color: #b0bec5; direction: ltr; }
        .item-pts { font-weight: 700; color: var(--primary); direction: ltr; font-size: 11px; }
        .empty { text-align: center; padding: 30px; } .empty-icon { font-size: 40px; } .empty-text { font-size: 12px; color: var(--text-gray); }
        .footer { position: relative; z-index: 1; text-align: center; padding: 6px 14px; font-size: 8px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="particles-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <header class="top-nav">
        <a href="home.html" class="btn-back">←</a>
        <span class="nav-title">📋 طلباتي</span>
    </header>
    <main class="main">
        <div class="card">
            <div class="card-header"><div class="card-icon ci-reports">📸</div><span class="card-label">نشاطاتي</span><span class="badge badge-red" id="reportsBadge">0</span></div>
            <div id="reportsList"><div class="empty"><span class="empty-icon">📭</span><div class="empty-text">لا توجد نشاطات</div></div></div>
        </div>
    </main>
    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <script>
        var SUPABASE_URL = 'https://ctkkkpcjwebkrcbzsvpf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc';
        var userEmail = localStorage.getItem('userEmail');

        function formatDateDZ(iso){if(!iso)return'';var d=new Date(iso);return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();}

        function loadRequests(){
            if(!userEmail){
                document.getElementById('reportsList').innerHTML = '<div class="empty"><span class="empty-icon">🔒</span><div class="empty-text">يرجى تسجيل الدخول</div></div>';
                return;
            }
            
            var x = new XMLHttpRequest();
            x.open('GET', SUPABASE_URL + '/rest/v1/point_transactions?select=*&user_email=eq.' + encodeURIComponent(userEmail) + '&order=created_at.desc&limit=30&apikey=' + SUPABASE_KEY, true);
            x.timeout = 15000;
            x.onload = function(){
                if(x.status === 200){
                    var data = JSON.parse(x.responseText);
                    document.getElementById('reportsBadge').textContent = data.length;
                    var rl = document.getElementById('reportsList');
                    
                    if(data.length === 0){
                        rl.innerHTML = '<div class="empty"><span class="empty-icon">📭</span><div class="empty-text">لا توجد نشاطات</div></div>';
                    } else {
                        rl.innerHTML = data.map(function(pt){
                            var icon = pt.amount > 0 ? '📸' : '🎁';
                            var title = pt.amount > 0 ? 'نقاط مكتسبة' : 'استبدال مكافأة';
                            var ptsClass = pt.amount > 0 ? 'item-pts' : '';
                            var ptsText = (pt.amount > 0 ? '+' : '') + pt.amount;
                            return '<div class="item"><span class="item-icon">' + icon + '</span><div class="item-info"><div class="item-title">' + title + '</div><div class="item-detail">' + (pt.description || '') + '</div><div class="item-time">' + formatDateDZ(pt.created_at) + '</div></div><span class="' + ptsClass + '" style="color:' + (pt.amount > 0 ? '#4CAF50' : '#E53935') + ';font-weight:700;direction:ltr;font-size:11px;">' + ptsText + '</span></div>';
                        }).join('');
                    }
                }
            };
            x.send();
        }

        loadRequests();
    </script>
</body>
</html>
