<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | مدينتنا نظيفة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50;
            --accent: #FF6F00; --accent-light: #FFA726;
            --danger: #E53935; --danger-light: #EF5350;
            --info: #1E88E5; --info-light: #42A5F5;
            --teal: #009688; --purple: #7B1FA2;
            --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F;
            --radius: 24px; --radius-sm: 14px;
            --shadow-xl: 0 30px 80px rgba(0,0,0,0.25);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.2);
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a1a0a; min-height: 100vh;
            color: var(--text-dark); overflow-x: hidden;
            position: relative; display: flex; flex-direction: column;
        }

        .particles-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden;
            background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%);
        }
        .particle {
            position: absolute; border-radius: 50%; pointer-events: none;
            animation: floatUp linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .orb {
            position: fixed; border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 350px; height: 350px; background: rgba(46,125,50,0.10); top: -8%; right: -8%; }
        .orb-2 { width: 300px; height: 300px; background: rgba(30,136,229,0.08); bottom: -12%; left: -6%; animation-delay: -4s; }
        .orb-3 { width: 250px; height: 250px; background: rgba(255,111,0,0.06); top: 40%; left: 50%; transform: translate(-50%,-50%); animation-delay: -6s; }
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(25px,-25px) scale(1.1); }
            66% { transform: translate(-15px,15px) scale(0.9); }
        }

        .top-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(10,31,10,0.85); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 10px 16px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        .btn-back {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: white;
            cursor: pointer; font-size: 16px; display: flex;
            align-items: center; justify-content: center;
            transition: var(--transition); text-decoration: none;
        }
        .btn-back:hover { background: rgba(255,255,255,0.12); }
        .nav-title { flex: 1; font-size: 16px; font-weight: 700; color: white; }
        .btn-refresh {
            font-size: 12px; padding: 7px 14px; border-radius: 18px;
            border: 1.5px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.06);
            color: white; cursor: pointer; font-family: 'Cairo', sans-serif;
            font-weight: 600; transition: var(--transition); display: flex; align-items: center; gap: 5px;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.4); }
        .btn-refresh:active { transform: scale(0.94); }

        .main-container {
            position: relative; z-index: 1; flex: 1;
            padding: 78px 16px 20px; max-width: 750px; margin: 0 auto; width: 100%;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px;
        }
        @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius); padding: 18px 12px; text-align: center;
            box-shadow: var(--shadow-lg); border: 1px solid rgba(255,255,255,0.2);
            animation: cardIn 0.5s ease both;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .stat-icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .stat-value {
            font-size: 24px; font-weight: 900; color: var(--primary-dark);
            direction: ltr; display: inline-block;
        }
        .stat-label { font-size: 10px; color: var(--text-gray); margin-top: 2px; font-weight: 600; }

        .card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius); padding: 20px 18px;
            box-shadow: var(--shadow-lg); margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: cardIn 0.5s ease both;
        }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .card-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 17px;
        }
        .ci-reports { background: #FFEBEE; } .ci-trucks { background: #E3F2FD; }
        .ci-co2 { background: #E0F2F1; } .ci-map { background: #FFF3E0; } .ci-sorting { background: #F3E5F5; }
        .card-label { flex: 1; font-size: 14px; font-weight: 700; color: var(--text-dark); }
        .badge {
            font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 700;
        }
        .badge-new { background: #FFEBEE; color: var(--danger); }
        .badge-ok { background: #E8F5E9; color: var(--primary); }
        .badge-warn { background: #FFF3E0; color: var(--accent); }

        #mapContainer {
            width: 100%; height: 300px; border-radius: var(--radius-sm);
            overflow: hidden; border: 2px solid rgba(0,0,0,0.06); z-index: 1;
        }
        #mapContainer .leaflet-control-attribution { font-size: 8px; }

        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table {
            width: 100%; border-collapse: collapse; min-width: 550px;
        }
        th {
            text-align: right; padding: 10px 8px; font-size: 10px;
            font-weight: 700; color: var(--text-gray);
            border-bottom: 2px solid rgba(0,0,0,0.05);
        }
        td {
            padding: 10px 8px; font-size: 11px;
            border-bottom: 1px solid rgba(0,0,0,0.03); color: var(--text-dark);
        }
        tr:hover td { background: rgba(0,0,0,0.015); }
        .pill {
            display: inline-block; padding: 3px 8px; border-radius: 8px;
            font-size: 10px; font-weight: 700;
        }
        .pill-new { background: #FFEBEE; color: var(--danger); }
        .pill-done { background: #E8F5E9; color: var(--primary); }
        .pill-pending { background: #FFF3E0; color: var(--accent); }

        .empty-state { text-align: center; padding: 28px 20px; }
        .empty-emoji { font-size: 44px; display: block; margin-bottom: 8px; }
        .empty-text { font-size: 13px; color: var(--text-gray); font-weight: 600; }

        .tabs {
            display: flex; gap: 4px; background: rgba(255,255,255,0.08);
            border-radius: 20px; padding: 4px; margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1; padding: 10px; border: none; border-radius: 17px;
            cursor: pointer; font-family: 'Cairo', sans-serif;
            font-size: 12px; font-weight: 700; transition: var(--transition);
            background: transparent; color: rgba(255,255,255,0.5);
        }
        .tab-btn.active {
            background: white; color: var(--primary-dark); box-shadow: var(--shadow);
        }

        .footer {
            position: relative; z-index: 1; text-align: center;
            padding: 8px 20px; font-size: 9px;
            color: rgba(255,255,255,0.45);
            background: linear-gradient(transparent, rgba(0,0,0,0.3));
        }

        .co2-bar {
            width: 100%; height: 8px; background: rgba(0,0,0,0.05);
            border-radius: 8px; overflow: hidden; margin-top: 8px;
        }
        .co2-fill {
            height: 100%; background: linear-gradient(90deg, #E53935, #FF9800, #4CAF50);
            border-radius: 8px; transition: width 1s ease; width: 0%;
        }

        .truck-list { display: flex; flex-direction: column; gap: 8px; }
        .truck-item {
            display: flex; align-items: center; gap: 10px;
            padding: 14px; border-radius: var(--radius-sm);
            background: white; box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.04); transition: var(--transition);
        }
        .truck-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .truck-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .truck-free { background: #E8F5E9; } .truck-busy { background: #FFF3E0; }
        .truck-info { flex: 1; }
        .truck-name { font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .truck-plate { font-size: 10px; color: var(--text-gray); direction: ltr; }
        .truck-status {
            font-size: 10px; padding: 4px 10px; border-radius: 8px; font-weight: 700;
        }
        .status-free { background: #E8F5E9; color: var(--primary); }
        .status-busy { background: #FFF3E0; color: var(--accent); }

        .highlight-box {
            background: #E8F5E9; padding: 12px 16px; border-radius: var(--radius-sm);
            text-align: center; margin-bottom: 10px; border: 1px solid #C8E6C9;
        }
        .highlight-box.warning { background: #FFF3E0; border-color: #FFE0B2; }

        .map-legend {
            display: flex; gap: 14px; margin-top: 8px;
            justify-content: center; font-size: 10px; color: var(--text-gray); font-weight: 600;
        }
        .map-legend span { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .ld-report { background: #E53935; }
        .ld-pickup { background: #FF9800; }

        .login-screen {
            position: relative; z-index: 1; flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 78px 16px 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: var(--radius); padding: 36px 24px; text-align: center;
            max-width: 380px; width: 100%;
            box-shadow: var(--shadow-xl); border: 1px solid rgba(255,255,255,0.2);
            animation: cardIn 0.5s ease;
        }
        .login-card input {
            width: 100%; padding: 14px; border: 2px solid #e0e0e0;
            border-radius: var(--radius-sm); text-align: center; font-size: 18px;
            font-family: 'Cairo', sans-serif; margin-bottom: 12px; direction: ltr;
            transition: var(--transition);
        }
        .login-card input:focus { outline: none; border-color: var(--primary); }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white; border: none; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Cairo', sans-serif; transition: var(--transition);
        }
        .login-btn:hover { background: #1B5E20; transform: translateY(-2px); }
        .login-error { color: var(--danger); font-size: 11px; margin-top: 8px; display: none; }
    </style>
</head>
<body>

    <div class="particles-bg" id="particlesBg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="top-nav">
        <a href="index.html" class="btn-back">←</a>
        <span class="nav-title">📊 لوحة تحكم الإدارة</span>
        <button class="btn-refresh" onclick="loadAll()">🔄 تحديث</button>
    </header>

    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div style="font-size:55px;margin-bottom:10px;">📊</div>
            <h2 style="font-size:20px;font-weight:900;color:#2E7D32;margin-bottom:6px;">لوحة تحكم الإدارة</h2>
            <p style="font-size:13px;color:#90A4AE;margin-bottom:18px;">دخول مخصص للمشرفين فقط</p>
            <input type="password" id="adminPass" placeholder="كلمة المرور">
            <button class="login-btn" onclick="checkPass()">🔒 دخول</button>
            <p class="login-error" id="loginError">كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <main class="main-container" id="dashMain" style="display:none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview', this)">📊 نظرة عامة</button>
            <button class="tab-btn" onclick="switchTab('reports', this)">📋 البلاغات</button>
            <button class="tab-btn" onclick="switchTab('sorting', this)">📦 طلبات الفرز</button>
            <button class="tab-btn" onclick="switchTab('fleet', this)">🚛 الأسطول</button>
        </div>
        <div id="tabContent"></div>
    </main>

    <footer class="footer">
        © 2026 مدينتنا نظيفة — جميع الحقوق محفوظة | وزارة البيئة والطاقات المتجددة
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============ SUPABASE ============
        var sb = window.supabase.createClient(
            'https://ctkkkpcjwebkrcbzsvpf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc'
        );

        // بيانات من Supabase
        var supabaseReports = [];
        var supabasePickups = [];
        var supabaseCompleted = [];

        // ============ جسيمات ============
        (function(){
            var c=document.getElementById('particlesBg');
            var colors=['#4CAF50','#81C784','#FFA726','#42A5F5','#FFCC02','#CE93D8','#26A69A'];
            for(var i=0;i<35;i++){
                var p=document.createElement('div');p.className='particle';
                var s=Math.random()*5+2;
                p.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*10+8)+'s;animation-delay:'+Math.random()*8+'s;box-shadow:0 0 '+s*2+'px currentColor;';
                c.appendChild(p);
            }
        })();

        // ============ تسجيل الدخول ============
        function checkPass(){
            var pass=document.getElementById('adminPass').value;
            if(pass==='admin2026'){
                document.getElementById('loginScreen').style.display='none';
                document.getElementById('dashMain').style.display='block';
                loadAll();
            }else{
                document.getElementById('loginError').style.display='block';
            }
        }

        var currentTab='overview';
        var mainMap=null;

        function getReports(){
            var local=JSON.parse(localStorage.getItem('reports')||'[]');
            return local.concat(supabaseReports);
        }
        function getSortingRequests(){
            var local=JSON.parse(localStorage.getItem('sortingRequests')||'[]');
            return local.concat(supabasePickups);
        }
        function getCompletedTasks(){
            var local=JSON.parse(localStorage.getItem('completedTasks')||'[]');
            return local.concat(supabaseCompleted);
        }

        async function loadAll(){
            // جلب من Supabase
            try{
                var r1=await sb.from('reports').select('*');
                if(!r1.error) supabaseReports=r1.data;
                var r2=await sb.from('pickups').select('*');
                if(!r2.error) supabasePickups=r2.data;
                var r3=await sb.from('completed').select('*');
                if(!r3.error) supabaseCompleted=r3.data.map(function(x){return x.task_id;});
            }catch(e){}
            
            renderTab();
            if(currentTab==='overview') setTimeout(initMap,400);
            var btn=document.querySelector('.btn-refresh');
            btn.textContent='✅ تم';
            setTimeout(function(){btn.textContent='🔄 تحديث';},800);
        }

        function switchTab(tab,btn){
            currentTab=tab;
            document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
            if(btn) btn.classList.add('active');
            renderTab();
            if(tab==='overview') setTimeout(initMap,400);
        }

        function formatTime(isoString){
            if(!isoString) return'—';
            var d=new Date(isoString);
            return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0')+' · '+d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
        }

        function getTypeName(type){
            var names={menagere:'منزلية',plastique:'بلاستيك',carton:'كرتون',verre:'زجاج',decombres:'أنقاض',autre:'أخرى'};
            return names[type]||type||'—';
        }

        function getMaterialName(mat){
            var names={carton:'📦 كرتون',plastique:'🫙 بلاستيك',verre:'🫗 زجاج'};
            return names[mat]||mat||'—';
        }

        function initMap(){
            var reports=getReports();
            var sorting=getSortingRequests();
            var allPoints=reports.concat(sorting).filter(function(r){return r.lat&&r.lng;});

            if(mainMap){mainMap.remove();mainMap=null;}
            var mapEl=document.getElementById('mapContainer');
            if(!mapEl) return;

            var centerLat=allPoints.length>0?allPoints[0].lat:36.0736;
            var centerLng=allPoints.length>0?allPoints[0].lng:4.7631;

            mainMap=L.map('mapContainer').setView([centerLat,centerLng],13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mainMap);

            var reportIcon=L.divIcon({className:'custom-marker',html:'<div style="background:#E53935;width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(229,57,53,0.5);border:2px solid white;"><span style="transform:rotate(45deg);font-size:14px;">🗑️</span></div>',iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-30]});
            var pickupIcon=L.divIcon({className:'custom-marker',html:'<div style="background:#FF9800;width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(255,152,0,0.5);border:2px solid white;"><span style="transform:rotate(45deg);font-size:14px;">📦</span></div>',iconSize:[28,28],iconAnchor:[14,28],popupAnchor:[0,-30]});

            reports.forEach(function(r){
                if(r.lat&&r.lng){
                    L.marker([r.lat,r.lng],{icon:reportIcon}).addTo(mainMap).bindPopup('<div style="font-family:Cairo,sans-serif;text-align:right"><strong>🚨 بلاغ</strong><br>النوع: '+getTypeName(r.type)+'</div>');
                }
            });
            sorting.forEach(function(r){
                if(r.lat&&r.lng){
                    L.marker([r.lat,r.lng],{icon:pickupIcon}).addTo(mainMap).bindPopup('<div style="font-family:Cairo,sans-serif;text-align:right"><strong>📦 طلب جمع</strong><br>'+getMaterialName(r.material)+'</div>');
                }
            });

            if(allPoints.length===0){
                L.marker([36.0736,4.7631]).addTo(mainMap).bindPopup('<div style="font-family:Cairo,sans-serif;text-align:right"><strong>📍 برج بوعريريج</strong></div>').openPopup();
            }
            setTimeout(function(){if(mainMap)mainMap.invalidateSize();},200);
        }

        function renderOverview(){
            var reports=getReports();
            var sorting=getSortingRequests();
            var completed=getCompletedTasks();
            var totalWeight=sorting.reduce(function(s,r){return s+(r.weight||0);},0);
            var co2Saved=Math.round(totalWeight*0.5);
            var allPoints=reports.concat(sorting).filter(function(r){return r.lat&&r.lng;});

            return '<div class="stats-grid">'+
                '<div class="stat-card"><span class="stat-icon">📋</span><div class="stat-value">'+reports.length.toLocaleString('en-US')+'</div><div class="stat-label">بلاغ مفرغة</div></div>'+
                '<div class="stat-card"><span class="stat-icon">📦</span><div class="stat-value">'+sorting.length.toLocaleString('en-US')+'</div><div class="stat-label">طلب جمع</div></div>'+
                '<div class="stat-card"><span class="stat-icon">✅</span><div class="stat-value">'+completed.length.toLocaleString('en-US')+'</div><div class="stat-label">مهمة مكتملة</div></div>'+
                '<div class="stat-card"><span class="stat-icon">🌱</span><div class="stat-value">'+co2Saved.toLocaleString('en-US')+'</div><div class="stat-label">كغ CO₂ وفر</div></div>'+
                '</div>'+
                (reports.length===0&&sorting.length===0?'<div class="highlight-box warning"><span style="font-size:20px">ℹ️</span><br><strong>لوحة التحكم جاهزة</strong><br><span style="font-size:11px;color:var(--text-gray)">في انتظار أول بلاغ</span></div>':'')+
                '<div class="card"><div class="card-header"><div class="card-icon ci-map">🗺️</div><span class="card-label">خريطة — '+allPoints.length+' نقطة</span></div><div id="mapContainer"></div>'+
                '<div class="map-legend"><span><span class="legend-dot ld-report"></span> بلاغ</span><span><span class="legend-dot ld-pickup"></span> طلب جمع</span></div></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon ci-co2">🌱</div><span class="card-label">البصمة الكربونية</span></div>'+
                '<div style="display:flex;justify-content:space-between;font-size:11px"><span>تم توفير '+co2Saved+' كغ CO₂</span><span>الهدف: 1,000 كغ</span></div>'+
                '<div class="co2-bar"><div class="co2-fill" style="width:'+Math.min((co2Saved/1000)*100,100)+'%"></div></div></div>';
        }

        function renderReports(){
            var reports=getReports();
            if(reports.length===0) return '<div class="card"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد بلاغات</span></div></div>';
            return '<div class="card"><div class="card-header"><div class="card-icon ci-reports">📋</div><span class="card-label">بلاغات المفرغات</span><span class="badge badge-new">'+reports.length+'</span></div>'+
                '<div class="table-wrap"><table><thead><tr><th>#</th><th>النوع</th><th>الإحداثيات</th><th>الوقت</th><th>الحالة</th></tr></thead><tbody>'+
                reports.map(function(r,i){return '<tr><td>'+(i+1)+'</td><td>'+getTypeName(r.type)+'</td><td style="direction:ltr;font-size:10px">'+(r.lat?r.lat.toFixed(4):'--')+', '+(r.lng?r.lng.toFixed(4):'--')+'</td><td style="direction:ltr;white-space:nowrap;font-size:10px">'+formatTime(r.time||r.created_at)+'</td><td><span class="pill pill-new">جديد</span></td></tr>';}).join('')+
                '</tbody></table></div></div>';
        }

        function renderSorting(){
            var sorting=getSortingRequests();
            if(sorting.length===0) return '<div class="card"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد طلبات فرز</span></div></div>';
            var totalW=sorting.reduce(function(s,r){return s+(r.weight||0);},0);
            return '<div class="card"><div class="card-header"><div class="card-icon ci-sorting">📦</div><span class="card-label">طلبات الفرز</span><span class="badge badge-warn">'+sorting.length+'</span></div>'+
                '<div style="font-size:12px;margin-bottom:12px;color:var(--primary-dark)">⚖️ '+totalW+' كغ</div>'+
                '<div class="table-wrap"><table><thead><tr><th>#</th><th>المادة</th><th>الوزن</th><th>الموقع</th><th>الوقت</th></tr></thead><tbody>'+
                sorting.map(function(r,i){return '<tr><td>'+(i+1)+'</td><td>'+getMaterialName(r.material)+'</td><td style="direction:ltr">'+(r.weight||0)+' كغ</td><td style="direction:ltr;font-size:10px">'+(r.lat?r.lat.toFixed(4):'--')+', '+(r.lng?r.lng.toFixed(4):'--')+'</td><td style="direction:ltr;font-size:10px">'+formatTime(r.time||r.created_at)+'</td></tr>';}).join('')+
                '</tbody></table></div></div>';
        }

        function renderFleet(){
            var trucks=[{id:1,driver:'كريم حداد',plate:'12345-16-01',status:'free',lat:36.7538,lng:3.0588},{id:2,driver:'نور الدين بلقاسم',plate:'12346-16-01',status:'busy',lat:36.7123,lng:3.1123},{id:3,driver:'عبد الله مرزوق',plate:'12347-16-01',status:'free',lat:36.7456,lng:3.0891}];
            return '<div class="card"><div class="card-header"><div class="card-icon ci-trucks">🚛</div><span class="card-label">أسطول الشاحنات</span><span class="badge badge-ok">'+trucks.length+' شاحنة</span></div><div class="truck-list">'+
                trucks.map(function(t){return '<div class="truck-item"><div class="truck-icon '+(t.status==='free'?'truck-free':'truck-busy')+'">🚛</div><div class="truck-info"><div class="truck-name">'+t.driver+'</div><div class="truck-plate">'+t.plate+' · 📍 '+t.lat+', '+t.lng+'</div></div><span class="truck-status '+(t.status==='free'?'status-free':'status-busy')+'">'+(t.status==='free'?'🟢 متاح':'🟠 في مهمة')+'</span></div>';}).join('')+
                '</div></div>';
        }

        function renderTab(){
            var container=document.getElementById('tabContent');
            if(currentTab==='overview'){container.innerHTML=renderOverview();setTimeout(initMap,400);}
            else if(currentTab==='reports') container.innerHTML=renderReports();
            else if(currentTab==='sorting') container.innerHTML=renderSorting();
            else if(currentTab==='fleet') container.innerHTML=renderFleet();
        }
    </script>
</body>
</html>
