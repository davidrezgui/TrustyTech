            var pi=L.divIcon({html:'<div style="background:#FF9800;width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(255,152,0,0.5);border:2px solid white;"><span style="transform:rotate(45deg);font-size:14px;">📦</span></div>',iconSize:[28,28],iconAnchor:[14,28]});
            reports.forEach(function(r){if(r.lat)L.marker([r.lat,r.lng],{icon:ri}).addTo(mainMap);});
            sorting.forEach(function(r){if(r.lat)L.marker([r.lat,r.lng],{icon:pi}).addTo(mainMap);});
            if(allPoints.length===0)L.marker([36.0736,4.7631]).addTo(mainMap);
            setTimeout(function(){if(mainMap)mainMap.invalidateSize();},200);
        }

        function renderAnalytics(){
            analyticsCharts.forEach(function(ch){ch.destroy();});analyticsCharts=[];
            var r=getReports(),s=getSortingRequests(),types={},materials={};
            r.forEach(function(x){var t=getTypeName(x.type);types[t]=(types[t]||0)+1;});
            s.forEach(function(x){var m=getMaterialName(x.material);materials[m]=(materials[m]||0)+1;});
            var ctx1=document.getElementById('chartPie');if(ctx1){var c1=new Chart(ctx1,{type:'doughnut',data:{labels:Object.keys(types),datasets:[{data:Object.values(types),backgroundColor:['#E53935','#FF9800','#1E88E5','#4CAF50','#9C27B0','#009688']}]}});analyticsCharts.push(c1);}
            var ctx2=document.getElementById('chartBar');if(ctx2){var c2=new Chart(ctx2,{type:'bar',data:{labels:Object.keys(materials),datasets:[{label:'كغ',data:Object.values(materials),backgroundColor:['#FFA726','#42A5F5','#66BB6A']}]}});analyticsCharts.push(c2);}
        }

        function renderOverview(){
            var r=getReports(),s=getSortingRequests(),c=getCompletedTasks(),tw=s.reduce(function(a,b){return a+(b.weight||0);},0),co2=Math.round(tw*0.5),all=r.concat(s).filter(function(x){return x.lat;});
            return '<div class="stats-grid">'+
                '<div class="stat-card"><span class="stat-icon">📋</span><div class="stat-value">'+r.length.toLocaleString('en-US')+'</div><div class="stat-label">بلاغ</div></div>'+
                '<div class="stat-card"><span class="stat-icon">📦</span><div class="stat-value">'+s.length.toLocaleString('en-US')+'</div><div class="stat-label">طلب جمع</div></div>'+
                '<div class="stat-card"><span class="stat-icon">✅</span><div class="stat-value">'+c.length.toLocaleString('en-US')+'</div><div class="stat-label">مكتمل</div></div>'+
                '<div class="stat-card"><span class="stat-icon">🎁</span><div class="stat-value">'+supabaseRedeems.length.toLocaleString('en-US')+'</div><div class="stat-label">طلبات مكافآت</div></div></div>'+
                (r.length===0&&s.length===0?'<div class="card"><div class="empty-state"><span class="empty-emoji">ℹ️</span><span class="empty-text">في انتظار أول بلاغ أو طلب جمع</span></div></div>':'')+
                '<div class="card"><div class="card-header"><div class="card-icon ci-map">🗺️</div><span class="card-label">الخريطة التفاعلية — '+all.length+' نقطة</span></div><div id="mapContainer"></div></div>';
        }

        function renderReports(){
            var r=getReports();if(r.length===0)return'<div class="card"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد بلاغات</span></div></div>';
            return'<div class="card"><div class="card-header"><div class="card-icon ci-reports">📋</div><span class="card-label">بلاغات المفرغات</span><span class="badge badge-new">'+r.length+'</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>النوع</th><th>الإحداثيات</th><th>الوقت</th></tr></thead><tbody>'+r.map(function(x,i){return'<tr><td>'+(i+1)+'</td><td>'+getTypeName(x.type)+'</td><td style="direction:ltr;font-size:10px">'+(x.lat||'--')+', '+(x.lng||'--')+'</td><td style="direction:ltr;font-size:10px">'+formatTime(x.created_at)+'</td></tr>';}).join('')+'</tbody></table></div></div>';
        }

        function renderSorting(){
            var s=getSortingRequests();if(s.length===0)return'<div class="card"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد طلبات</span></div></div>';

        }

        function renderFleet(){
            var t=[{id:1,driver:'كريم حداد',plate:'12345-16-01',status:'free'},{id:2,driver:'نور الدين بلقاسم',plate:'12346-16-01',status:'busy'},{id:3,driver:'عبد الله مرزوق',plate:'12347-16-01',status:'free'}];
            return'<div class="card"><div class="card-header"><div class="card-icon ci-trucks">🚛</div><span class="card-label">أسطول الشاحنات</span><span class="badge badge-ok">'+t.length+' مركبة</span></div><div class="fleet-grid">'+t.map(function(x){return'<div class="fleet-card"><span class="fleet-icon">🚛</span><div class="fleet-name">'+x.driver+'</div><div class="fleet-plate">'+x.plate+'</div><span class="fleet-status '+(x.status==='free'?'fleet-free':'fleet-busy')+'">'+(x.status==='free'?'🟢 متاح':'🟠 في مهمة')+'</span></div>';}).join('')+'</div></div>';
        }

        function updatePurchaseStatus(id,status){
            var xhr=new XMLHttpRequest();
            xhr.open('PATCH',API_URL+'/rest/v1/purchases?id=eq.'+id+'&apikey='+API_KEY,true);
            xhr.setRequestHeader('Content-Type','application/json');xhr.setRequestHeader('Prefer','return=minimal');
            xhr.onload=function(){loadAll();};
            xhr.send(JSON.stringify({status:status}));
        }

        function issueInvoice(purchaseId){
            var purchase=null;for(var i=0;i<supabasePurchases.length;i++){if(supabasePurchases[i].id===purchaseId){purchase=supabasePurchases[i];break;}}
            if(!purchase){alert('لم يتم العثور على العرض');return;}
            var qty=purchase.quantity||0,price=purchase.price_per_kg||0,total=qty*price;
            var xhr=new XMLHttpRequest();
            xhr.open('POST',API_URL+'/rest/v1/invoices?apikey='+API_KEY,true);
            xhr.setRequestHeader('Content-Type','application/json');xhr.setRequestHeader('Prefer','return=minimal');
            xhr.onload=function(){if(xhr.status===201){alert('✅ تم إصدار الفاتورة!');loadAll();}else{alert('❌ خطأ: '+xhr.status);}};
            xhr.send(JSON.stringify({purchase_id:purchaseId,material:purchase.material,quantity:qty,price_per_kg:price,total:total,company_name:'شركة التدوير',status:'issued'}));
        }

        function printInvoice(invId){window.open('invoice.html?id='+invId,'_blank');}

        function renderSales(){
            var p=supabasePurchases;if(p.length===0)return'<div class="card"><div class="empty-state"><span class="empty-emoji">💰</span><span class="empty-text">لا توجد عروض شراء</span></div></div>';
            var names={carton:'📦 كرتون',plastique:'🫙 بلاستيك',verre:'🫗 زجاج'};
            return'<div class="card"><div class="card-header"><div class="card-icon ci-sales">🏭</div><span class="card-label">عروض شراء الشركات</span><span class="badge badge-teal">'+p.length+' عرض</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>المادة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th>الحالة</th><th>الإجراء</th></tr></thead><tbody>'+p.map(function(x,i){var q=x.quantity||0,pr=x.price_per_kg||0,tot=q*pr,a='';if(x.status==='pending')a='<button class="btn-action-sm btn-accept" onclick="updatePurchaseStatus('+x.id+',\'accepted\')">✅</button> <button class="btn-action-sm btn-reject" onclick="updatePurchaseStatus('+x.id+',\'rejected\')">❌</button>';else if(x.status==='accepted')a='<button class="btn-action-sm btn-paid" onclick="updatePurchaseStatus('+x.id+',\'paid\')">💰</button>';else if(x.status==='paid'){var al=supabaseInvoices.some(function(inv){return inv.purchase_id===x.id;});a=al?'<span class="pill" style="background:#E8EAF6;color:#283593;">🧾 صدرت</span>':'<button class="btn-action-sm btn-invoice" onclick="issueInvoice('+x.id+')">🧾 إصدار</button>';}else a='<span class="pill pill-new">❌</span>';var sp=x.status==='pending'?'pill-pending':(x.status==='accepted'?'pill-done':(x.status==='paid'?'pill-paid':'pill-new'));var st=x.status==='pending'?'⏳':(x.status==='accepted'?'✅':(x.status==='paid'?'💰':'❌'));return'<tr><td>'+(i+1)+'</td><td>'+(names[x.material]||x.material)+'</td><td style="direction:ltr;">'+q+' كغ</td><td style="direction:ltr;">'+pr+' دج</td><td style="direction:ltr;color:var(--teal);">'+tot.toLocaleString('en-US')+' دج</td><td><span class="pill '+sp+'">'+st+'</span></td><td>'+a+'</td></tr>';}).join('')+'</tbody></table></div></div>';
        }

        function renderAnalyticsHTML(){
            return'<div class="card"><div class="card-header"><div class="card-icon ci-analytics">📊</div><span class="card-label">توزيع أنواع النفايات</span></div><div class="chart-box"><canvas id="chartPie"></canvas></div></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon ci-analytics">📈</div><span class="card-label">كميات المواد المجمعة</span></div><div class="chart-box"><canvas id="chartBar"></canvas></div></div>';
        }

        function renderInvoices(){
            var inv=supabaseInvoices;if(inv.length===0)return'<div class="card"><div class="empty-state"><span class="empty-emoji">🧾</span><span class="empty-text">لا توجد فواتير</span></div></div>';
            var names={carton:'📦 كرتون',plastique:'🫙 بلاستيك',verre:'🫗 زجاج'};
            return'<div class="card"><div class="card-header"><div class="card-icon ci-invoices">🧾</div><span class="card-label">الفواتير الصادرة</span><span class="badge badge-purple">'+inv.length+' فاتورة</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>المادة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th>طباعة</th></tr></thead><tbody>'+inv.map(function(x,i){return'<tr><td>'+(i+1)+'</td><td>'+(names[x.material]||x.material)+'</td><td style="direction:ltr;">'+(x.quantity||0)+' كغ</td><td style="direction:ltr;">'+x.price_per_kg+' دج</td><td style="direction:ltr;color:var(--teal);font-weight:700;">'+(x.total||0).toLocaleString('en-US')+' دج</td><td><button class="btn-action-sm btn-invoice" onclick="printInvoice('+x.id+')">🖨️</button></td></tr>';}).join('')+'</tbody></table></div></div>';
        }

        function renderRedeems(){
            var rd=supabaseRedeems;
            if(rd.length===0)return'<div class="card"><div class="empty-state"><span class="empty-emoji">🎁</span><span class="empty-text">لا توجد طلبات مكافآت</span></div></div>';
            return'<div class="card"><div class="card-header"><div class="card-icon ci-redeems">🎁</div><span class="card-label">طلبات المكافآت</span><span class="badge badge-warn">'+rd.length+' طلب</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>المستخدم</th><th>المكافأة</th><th>النقاط</th><th>الحالة</th><th>الوقت</th></tr></thead><tbody>'+rd.map(function(x,i){var st=x.status==='pending'?'<span class="pill pill-pending">⏳ قيد الانتظار</span>':(x.status==='done'?'<span class="pill pill-done">✅ تم</span>':'<span class="pill pill-new">❌ ملغى</span>');return'<tr><td>'+(i+1)+'</td><td>'+x.user_email+'</td><td>'+x.reward_name+'</td><td style="direction:ltr;font-weight:700;">'+x.cost+'</td><td>'+st+'</td><td style="direction:ltr;font-size:10px">'+formatTime(x.created_at)+'</td></tr>';}).join('')+'</tbody></table></div></div>';
        }

        function renderSettings(){
            return'<div class="card"><div class="card-header"><div class="card-icon" style="background:#E3F2FD;">✉️</div><span class="card-label">إرسال إشعار جديد</span></div>'+
                '<input type="text" class="settings-input" id="notifTitle" placeholder="عنوان الإشعار" style="text-align:right;direction:rtl;">'+
                '<textarea id="notifMessage" class="settings-input" placeholder="نص الإشعار" style="text-align:right;direction:rtl;height:80px;resize:vertical;font-family:\'Cairo\',sans-serif;"></textarea>'+
                '<select id="notifType" class="settings-input" style="text-align:right;direction:rtl;font-family:\'Cairo\',sans-serif;">'+
                '<option value="info">🔵 معلومات</option><option value="success">🟢 نجاح</option><option value="warning">🟠 تحذير</option><option value="danger">🔴 خطر</option>'+
                '</select><button class="btn-settings btn-send-notif" onclick="sendNotification()">🚀 إرسال الإشعار</button><p class="notif-success" id="notifSuccess">✅ تم إرسال الإشعار بنجاح!</p></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon" style="background:#F3E5F5;">📱</div><span class="card-label">طباعة QR Codes للمهام</span></div>'+
                '<a href="qrcode.html" class="btn-settings btn-qr-settings">📱 فتح صفحة طباعة QR Codes</a></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon ci-settings">🔐</div><span class="card-label">تغيير كلمة مرور المشرف</span></div>'+
                '<input type="password" class="settings-input" id="newPassword" placeholder="كلمة المرور الجديدة"><button class="btn-settings btn-change-pass" onclick="changePassword()">🔐 حفظ كلمة المرور الجديدة</button></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon ci-settings">📊</div><span class="card-label">حالة قاعدة البيانات</span></div><div class="table-wrap"><table><thead><tr><th>الجدول</th><th>عدد السجلات</th></tr></thead><tbody>'+
                '<tr><td>📋 البلاغات</td><td style="direction:ltr;font-weight:700;">'+supabaseReports.length.toLocaleString('en-US')+'</td></tr>'+
                '<tr><td>📦 طلبات الجمع</td><td style="direction:ltr;font-weight:700;">'+supabasePickups.length.toLocaleString('en-US')+'</td></tr>'+
                '<tr><td>🏭 المبيعات</td><td style="direction:ltr;font-weight:700;">'+supabasePurchases.length.toLocaleString('en-US')+'</td></tr>'+
                '<tr><td>🧾 الفواتير</td><td style="direction:ltr;font-weight:700;">'+supabaseInvoices.length.toLocaleString('en-US')+'</td></tr>'+
                '<tr><td>🎁 المكافآت</td><td style="direction:ltr;font-weight:700;">'+supabaseRedeems.length.toLocaleString('en-US')+'</td></tr>'+
                '</tbody></table></div></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon ci-settings">📥</div><span class="card-label">تصدير البيانات</span></div>'+
                '<button class="btn-settings btn-export" onclick="exportCSV()">📥 تحميل CSV</button></div>'+
                '<div class="card"><div class="card-header"><div class="card-icon ci-settings" style="background:#FFEBEE;">🗄️</div><span class="card-label">تفريغ قاعدة البيانات</span></div>'+
                '<p style="font-size:11px;color:#E53935;margin-bottom:8px;">⚠️ تحذير: لا يمكن التراجع عن هذا الإجراء.</p><button class="btn-settings btn-clear" onclick="showClearConfirm()">🗄️ تفريغ جميع البيانات</button>'+
                '<div class="confirm-box" id="clearConfirm"><p style="font-size:11px;margin-bottom:6px;color:#E53935;">أدخل كلمة المرور للتأكيد:</p>'+
                '<input type="password" id="confirmPass" placeholder="كلمة المرور"><button class="btn-action-sm btn-accept" onclick="clearAllData()">✅ تأكيد</button><button class="btn-action-sm btn-reject" onclick="hideClearConfirm()">❌ إلغاء</button></div></div>';
        }

        function sendNotification(){
            var title=document.getElementById('notifTitle').value.trim(),message=document.getElementById('notifMessage').value.trim(),type=document.getElementById('notifType').value;
            if(!title||!message){alert('⚠️ الرجاء ملء العنوان والنص');return;}
            var xhr=new XMLHttpRequest();
            xhr.open('POST',API_URL+'/rest/v1/notifications?apikey='+API_KEY,true);
            xhr.setRequestHeader('Content-Type','application/json');xhr.setRequestHeader('Prefer','return=minimal');
            xhr.onload=function(){if(xhr.status===201){document.getElementById('notifTitle').value='';document.getElementById('notifMessage').value='';var sm=document.getElementById('notifSuccess');sm.style.display='block';setTimeout(function(){sm.style.display='none';},2500);}else{alert('❌ خطأ: '+xhr.status);}};
            xhr.send(JSON.stringify({title:title,message:message,type:type,is_read:false}));
        }

        function showClearConfirm(){document.getElementById('clearConfirm').style.display='block';}
        function hideClearConfirm(){document.getElementById('clearConfirm').style.display='none';}

        function changePassword(){
            var newPass=document.getElementById('newPassword').value;
            if(!newPass||newPass.length<4){alert('كلمة المرور يجب أن تكون 4 أحرف على الأقل');return;}
            var xhr=new XMLHttpRequest();
            xhr.open('PATCH',API_URL+'/rest/v1/settings?id=eq.1&apikey='+API_KEY,true);
            xhr.setRequestHeader('Content-Type','application/json');
            xhr.setRequestHeader('Prefer','return=minimal');
            xhr.timeout=15000;
            xhr.onload=function(){
                if(xhr.status===204){
                    currentAdminPassword=newPass;
                    alert('✅ تم تغيير كلمة المرور بنجاح!');
                    document.getElementById('newPassword').value='';
                } else {
                    alert('❌ خطأ في تغيير كلمة المرور. الرمز: '+xhr.status);
                }
            };
            xhr.onerror=function(){alert('❌ فشل الاتصال');};
            xhr.send(JSON.stringify({admin_password:newPass}));
        }

        function exportCSV(){
            var csv='نوع,مادة,وزن,خط عرض,خط طول,وقت\n';
            supabaseReports.forEach(function(r){csv+='بلاغ,'+getTypeName(r.type)+',,,'+r.lat+','+r.lng+','+r.created_at+'\n';});
            supabasePickups.forEach(function(r){csv+='طلب جمع,'+getMaterialName(r.material)+','+(r.weight||0)+','+r.lat+','+r.lng+','+r.created_at+'\n';});
            var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='madina-nadhifa-data.csv';a.click();
            alert('✅ تم تحميل البيانات!');
        }

        function clearAllData(){
            var pass=document.getElementById('confirmPass').value;
            if(pass!==currentAdminPassword){alert('❌ كلمة المرور غير صحيحة');return;}
            if(!confirm('هل أنت متأكد 100%؟'))return;
            var tables=['reports','pickups','completed','purchases','invoices','redeems','notifications'],done=0;
            tables.forEach(function(table){
                var xhr=new XMLHttpRequest();
                xhr.open('DELETE',API_URL+'/rest/v1/'+table+'?not.is=null&apikey='+API_KEY,true);
                xhr.setRequestHeader('Prefer','return=minimal');
                xhr.onload=function(){done++;if(done===tables.length){alert('✅ تم تفريغ جميع الجداول!');loadAll();}};
                xhr.send();
            });
            hideClearConfirm();
        }

        function renderTab(){
            var c=document.getElementById('tabContent');
            if(currentTab==='overview'){c.innerHTML=renderOverview();setTimeout(initMap,400);}
            else if(currentTab==='reports')c.innerHTML=renderReports();
            else if(currentTab==='sorting')c.innerHTML=renderSorting();
            else if(currentTab==='fleet')c.innerHTML=renderFleet();
            else if(currentTab==='sales')c.innerHTML=renderSales();
            else if(currentTab==='analytics'){c.innerHTML=renderAnalyticsHTML();setTimeout(renderAnalytics,500);}
            else if(currentTab==='invoices')c.innerHTML=renderInvoices();
            else if(currentTab==='redeems')c.innerHTML=renderRedeems();
            else if(currentTab==='settings')c.innerHTML=renderSettings();
        }
    </script>
