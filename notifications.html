<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات | مدينتنا نظيفة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50;
            --accent: #FF6F00; --danger: #E53935; --info: #1E88E5; --teal: #009688;
            --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F;
            --radius: 20px; --radius-sm: 12px;
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 350px; height: 350px; background: rgba(30,136,229,0.10); top: -8%; right: -8%; }
        .orb-2 { width: 300px; height: 300px; background: rgba(46,125,50,0.10); bottom: -12%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(25px,-25px) scale(1.1); } 66% { transform: translate(-15px,15px) scale(0.9); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
        .btn-back { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: var(--transition); text-decoration: none; }
        .btn-back:hover { background: rgba(255,255,255,0.12); }
        .nav-title { flex: 1; font-size: 17px; font-weight: 800; color: white; }
        .main-container { position: relative; z-index: 1; flex: 1; padding: 82px 16px 24px; max-width: 550px; margin: 0 auto; width: 100%; }
        .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 22px 20px; box-shadow: var(--shadow); margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.12); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .card-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 19px; background: #E3F2FD; }
        .card-label { flex: 1; font-size: 15px; font-weight: 800; color: var(--text-dark); }
        .notif-list { display: flex; flex-direction: column; gap: 10px; }
        .notif-item { display: flex; gap: 12px; padding: 14px; border-radius: var(--radius-sm); background: rgba(0,0,0,0.02); border-right: 4px solid var(--info); transition: var(--transition); cursor: pointer; }
        .notif-item.unread { background: rgba(30,136,229,0.04); border-right-color: var(--info); }
        .notif-item.warning { border-right-color: var(--accent); }
        .notif-item.success { border-right-color: var(--primary); }
        .notif-item.danger { border-right-color: var(--danger); }
        .notif-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .dot-unread { background: var(--info); animation: dotPulse 1.5s ease-in-out infinite; }
        @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        .dot-read { background: #ccc; }
        .notif-content { flex: 1; }
        .notif-title { font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .notif-message { font-size: 11px; color: var(--text-gray); margin-top: 3px; line-height: 1.5; }
        .notif-time { font-size: 10px; color: var(--text-gray); margin-top: 4px; direction: ltr; text-align: right; }
        .empty-state { text-align: center; padding: 32px; }
        .empty-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
        .empty-text { font-size: 13px; color: var(--text-gray); }
        .footer { position: relative; z-index: 1; text-align: center; padding: 10px 20px; font-size: 10px; color: rgba(255,255,255,0.4); background: linear-gradient(transparent, rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

    <div class="particles-bg" id="particlesBg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="top-nav">
        <a href="index.html" class="btn-back">←</a>
        <span class="nav-title">🔔 الإشعارات والتنبيهات</span>
    </header>

    <main class="main-container">
        <div class="card">
            <div class="card-header"><div class="card-icon">🔔</div><span class="card-label">آخر الإشعارات</span></div>
            <div class="notif-list" id="notifList">
                <div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد إشعارات حالياً</span></div>
            </div>
        </div>
    </main>

    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var sb = window.supabase.createClient('https://ctkkkpcjwebkrcbzsvpf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc');

        (function(){var c=document.getElementById('particlesBg');var colors=['#42A5F5','#1E88E5','#4CAF50'];for(var i=0;i<20;i++){var p=document.createElement('div');p.className='particle';var s=Math.random()*4+2;p.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*8+8)+'s;animation-delay:'+Math.random()*6+'s;';c.appendChild(p);}})();

        // ============ تحديد جميع الإشعارات كمقروءة ============
        function markAllAsRead(){
            // تحديث كل الإشعارات غير المقروءة إلى مقروءة
            var xhr = new XMLHttpRequest();
            xhr.open('PATCH', 'https://ctkkkpcjwebkrcbzsvpf.supabase.co/rest/v1/notifications?is_read=eq.false');
            xhr.setRequestHeader('apikey', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc');
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Prefer', 'return=minimal');
            xhr.send(JSON.stringify({is_read: true}));
        }

        async function loadNotifications(){
            var container = document.getElementById('notifList');
            try{
                var r = await sb.from('notifications').select('*').order('created_at',{ascending:false}).limit(20);
                if(!r.error && r.data.length>0){
                    container.innerHTML = r.data.map(function(n){
                        var dotClass = n.is_read ? 'dot-read' : 'dot-unread';
                        var typeClass = n.type === 'warning' ? 'warning' : (n.type === 'success' ? 'success' : (n.type === 'danger' ? 'danger' : ''));
                        var unreadClass = !n.is_read ? 'unread' : '';
                        var timeText = n.created_at ? new Date(n.created_at).toLocaleDateString('ar-DZ',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
                        return '<div class="notif-item '+typeClass+' '+unreadClass+'">'+
                            '<span class="notif-dot '+dotClass+'"></span>'+
                            '<div class="notif-content">'+
                                '<div class="notif-title">'+n.title+'</div>'+
                                '<div class="notif-message">'+n.message+'</div>'+
                                '<div class="notif-time">'+timeText+'</div>'+
                            '</div>'+
                        '</div>';
                    }).join('');

                    // تحديد كل الإشعارات كمقروءة بعد عرضها
                    markAllAsRead();
                } else {
                    container.innerHTML = '<div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد إشعارات حالياً</span></div>';
                }
            }catch(e){
                container.innerHTML = '<div class="empty-state"><span class="empty-emoji">⚠️</span><span class="empty-text">تعذر تحميل الإشعارات</span></div>';
            }
        }

        loadNotifications();
    </script>
</body>
</html>
