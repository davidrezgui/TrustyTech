<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات | مدينتنا نظيفة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50; --accent: #FF6F00; --danger: #E53935; --info: #1E88E5; --teal: #009688; --purple: #7B1FA2; --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F; --radius: 20px; --radius-sm: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 28px rgba(0,0,0,0.12); --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: rgba(30,136,229,0.08); top: -8%; right: -8%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(46,125,50,0.08); bottom: -10%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
        .btn-back { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0; }
        .nav-title { flex: 1; font-size: 15px; font-weight: 700; color: white; }
        .nav-actions { display: flex; gap: 6px; }
        .btn-mark-read { font-size: 10px; padding: 6px 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: white; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 600; white-space: nowrap; transition: var(--transition); }
        .btn-mark-read:hover { background: rgba(255,255,255,0.14); }
        .main-container { position: relative; z-index: 1; flex: 1; padding: 72px 12px 20px; max-width: 560px; margin: 0 auto; width: 100%; }
        .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-box { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border-radius: var(--radius-sm); padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
        .stat-value { font-size: 22px; font-weight: 900; color: white; direction: ltr; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; font-weight: 600; }
        .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 18px 14px; box-shadow: var(--shadow); margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.12); }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .card-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #E3F2FD; }
        .card-label { flex: 1; font-size: 14px; font-weight: 800; color: var(--text-dark); }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 700; background: #E3F2FD; color: var(--info); }
        .notif-list { display: flex; flex-direction: column; gap: 8px; }
        .notif-item { display: flex; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); background: white; border-right: 3px solid var(--info); transition: var(--transition); position: relative; box-shadow: 0 1px 4px rgba(0,0,0,0.03); animation: slideIn 0.4s ease both; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .notif-item.unread { background: rgba(30,136,229,0.03); }
        .notif-item.warning { border-right-color: var(--accent); } .notif-item.success { border-right-color: var(--primary); } .notif-item.danger { border-right-color: var(--danger); }
        .notif-left { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
        .notif-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-unread { background: var(--info); animation: dotPulse 1.5s ease-in-out infinite; }
        @keyframes dotPulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(30,136,229,0.4);} 50%{opacity:0.5;box-shadow:0 0 0 6px rgba(30,136,229,0);} }
        .dot-read { background: #ddd; }
        .notif-icon { font-size: 18px; }
        .btn-delete-notif { width: 22px; height: 22px; border-radius: 50%; border: none; background: transparent; color: #ccc; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: var(--transition); margin-top: 2px; }
        .btn-delete-notif:hover { background: #FFEBEE; color: var(--danger); }
        .notif-content { flex: 1; min-width: 0; }
        .notif-title { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
        .notif-message { font-size: 10px; color: var(--text-gray); line-height: 1.5; }
        .notif-time { font-size: 9px; color: #b0bec5; margin-top: 4px; direction: ltr; text-align: right; }
        .empty-state { text-align: center; padding: 40px 20px; } .empty-emoji { font-size: 50px; display: block; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .empty-text { font-size: 14px; color: var(--text-gray); font-weight: 600; }
        .empty-sub { font-size: 11px; color: #b0bec5; margin-top: 4px; }
        .btn-clear-all { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1.5px solid #FFCDD2; background: white; color: var(--danger); cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 600; margin-top: 8px; transition: var(--transition); }
        .btn-clear-all:hover { background: #FFF5F5; }
        .footer { position: relative; z-index: 1; text-align: center; padding: 6px 16px; font-size: 8px; color: rgba(255,255,255,0.4); }
        @media (max-width: 380px) { .notif-item { padding: 10px; gap: 6px; } .notif-title { font-size: 11px; } .notif-message { font-size: 9px; } }
    </style>
</head>
<body>
    <div class="particles-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <header class="top-nav">
        <a href="#" class="btn-back" id="backBtn">←</a>
        <span class="nav-title">🔔 الإشعارات</span>
        <div class="nav-actions">
            <button class="btn-mark-read" onclick="markAllAsRead()">✅ قراءة الكل</button>
        </div>
    </header>
    <main class="main-container">
        <div class="stats-row">
            <div class="stat-box"><div class="stat-value" id="totalCount">0</div><div class="stat-label">إجمالي الإشعارات</div></div>
            <div class="stat-box"><div class="stat-value" id="unreadCount">0</div><div class="stat-label">غير مقروءة</div></div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-icon">🔔</div><span class="card-label">آخر الإشعارات</span><span class="badge" id="notifBadge">0</span></div>
            <div class="notif-list" id="notifList"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد إشعارات</span><span class="empty-sub">ستظهر هنا الإشعارات والتنبيهات</span></div></div>
            <button class="btn-clear-all" id="btnClearAll" style="display:none;" onclick="clearAllNotifications()">🗑️ مسح جميع الإشعارات</button>
        </div>
    </main>
    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <script>
        var SUPABASE_URL = 'https://ctkkkpcjwebkrcbzsvpf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc';
        
        // ============ ✅ زر الرجوع الذكي ============
        (function(){
            var ref = document.referrer;
            var backBtn = document.getElementById('backBtn');
            if (ref.indexOf('home.html') !== -1) {
                backBtn.href = 'home.html';
            } else if (ref.indexOf('dashboard.html') !== -1) {
                backBtn.href = 'dashboard.html';
            } else {
                backBtn.href = 'index.html';
            }
        })();

        function formatDateDZ(iso){if(!iso)return'';var d=new Date(iso);return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();}
        function formatTimeDZ(iso){if(!iso)return'';var d=new Date(iso);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

        function getTypeIcon(type){
            if(type==='warning')return'⚠️';if(type==='success')return'✅';if(type==='danger')return'🔴';return'🔵';
        }

        function loadNotifications(){
            var xhr = new XMLHttpRequest();
            xhr.open('GET', SUPABASE_URL + '/rest/v1/notifications?select=*&order=created_at.desc&limit=30&apikey=' + SUPABASE_KEY, true);
            xhr.timeout = 15000;
            xhr.onload = function(){
                var container = document.getElementById('notifList');
                if(xhr.status === 200){
                    var allNotifications = JSON.parse(xhr.responseText);
                    var total = allNotifications.length;
                    var unread = allNotifications.filter(function(n){return !n.is_read;}).length;
                    
                    document.getElementById('totalCount').textContent = total;
                    document.getElementById('unreadCount').textContent = unread;
                    document.getElementById('notifBadge').textContent = total;
                    document.getElementById('btnClearAll').style.display = total > 0 ? 'block' : 'none';
                    
                    if(total === 0){
                        container.innerHTML = '<div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد إشعارات</span><span class="empty-sub">ستظهر هنا الإشعارات والتنبيهات</span></div>';
                    } else {
                        container.innerHTML = allNotifications.map(function(n, i){
                            var dotClass = n.is_read ? 'dot-read' : 'dot-unread';
                            var typeClass = n.type || '';
                            var unreadClass = !n.is_read ? 'unread' : '';
                            var dateStr = formatDateDZ(n.created_at) + ' ' + formatTimeDZ(n.created_at);
                            var icon = getTypeIcon(n.type);
                            return '<div class="notif-item '+typeClass+' '+unreadClass+'" style="animation-delay:'+(i*0.05)+'s" id="notif_'+n.id+'">'+
                                '<div class="notif-left"><span class="notif-dot '+dotClass+'"></span><span class="notif-icon">'+icon+'</span><button class="btn-delete-notif" onclick="deleteNotification('+n.id+')" title="حذف">✕</button></div>'+
                                '<div class="notif-content"><div class="notif-title">'+n.title+'</div><div class="notif-message">'+n.message+'</div><div class="notif-time">'+dateStr+'</div></div>'+
                            '</div>';
                        }).join('');
                        markAllAsRead();
                    }
                } else {
                    container.innerHTML = '<div class="empty-state"><span class="empty-emoji">⚠️</span><span class="empty-text">تعذر تحميل الإشعارات</span></div>';
                }
            };
            xhr.onerror = function(){ document.getElementById('notifList').innerHTML = '<div class="empty-state"><span class="empty-emoji">⚠️</span><span class="empty-text">تعذر الاتصال</span></div>'; };
            xhr.send();
        }

        function markAllAsRead(){
            var xhr = new XMLHttpRequest();
            xhr.open('PATCH', SUPABASE_URL + '/rest/v1/notifications?is_read=eq.false&apikey=' + SUPABASE_KEY, true);
            xhr.setRequestHeader('Content-Type', 'application/json');xhr.setRequestHeader('Prefer', 'return=minimal');
            xhr.onload = function(){ if(xhr.status === 204){ document.getElementById('unreadCount').textContent = '0'; localStorage.setItem('unreadCount', '0'); } };
            xhr.send(JSON.stringify({is_read: true}));
        }

        function deleteNotification(id){
            if(!confirm('هل أنت متأكد من حذف هذا الإشعار؟')) return;
            var xhr = new XMLHttpRequest();
            xhr.open('DELETE', SUPABASE_URL + '/rest/v1/notifications?id=eq.' + id + '&apikey=' + SUPABASE_KEY, true);
            xhr.setRequestHeader('Prefer', 'return=minimal');
            xhr.onload = function(){ if(xhr.status === 204){ var el = document.getElementById('notif_'+id); if(el){ el.style.opacity='0'; el.style.transform='scale(0.9)'; setTimeout(function(){loadNotifications();},300); } } };
            xhr.send();
        }

        function clearAllNotifications(){
            if(!confirm('هل أنت متأكد من مسح جميع الإشعارات؟')) return;
            var xhr = new XMLHttpRequest();
            xhr.open('DELETE', SUPABASE_URL + '/rest/v1/notifications?id=gt.0&apikey=' + SUPABASE_KEY, true);
            xhr.setRequestHeader('Prefer', 'return=minimal');
            xhr.onload = function(){ if(xhr.status === 204){ loadNotifications(); } };
            xhr.send();
        }

        loadNotifications();
    </script>
</body>
</html>
