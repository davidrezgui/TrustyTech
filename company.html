<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>شركات التدوير | مدينتنا نظيفة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2E7D32;
            --primary-dark: #1B5E20;
            --primary-light: #4CAF50;
            --accent: #FF6F00;
            --accent-light: #FFA726;
            --teal: #009688;
            --teal-light: #26A69A;
            --danger: #E53935;
            --white: #FFFFFF;
            --text-main: #1a1a1a;
            --text-gray: #78909C;
            --text-light: #B0BEC5;
            --bg-card: rgba(255, 255, 255, 0.96);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.2);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0d1f0d;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* خلفية ثابتة - بدون مود ليلي */
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(160deg, #0a1a0a 0%, #061406 100%);
        }

        .bg-fixed::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(0,150,136,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(46,125,50,0.06) 0%, transparent 60%);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb-1 {
            width: 350px;
            height: 350px;
            background: rgba(0, 150, 136, 0.12);
            top: -15%;
            right: -15%;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(46, 125, 50, 0.08);
            bottom: -15%;
            left: -10%;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 220px;
            height: 220px;
            background: rgba(255, 111, 0, 0.06);
            top: 45%;
            right: 15%;
            animation-delay: -3s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        /* Navbar */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(10, 26, 10, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-back:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.12);
        }

        .nav-title {
            flex: 1;
            font-size: 17px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.3px;
        }

        .btn-refresh {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-refresh:active {
            transform: scale(0.94);
        }

        .btn-refresh.loading {
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 1;
            flex: 1;
            padding: 88px 16px 24px;
            max-width: 560px;
            margin: 0 auto;
            width: 100%;
        }

        /* Stats Row - 4 مربعات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            padding: 14px 6px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            transition: 0.2s ease;
        }

        .stat-card:active {
            transform: scale(0.97);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 900;
            color: #00695C;
            direction: ltr;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 10px;
            color: #607D8B;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Main Card */
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px 16px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(0, 150, 136, 0.15);
        }

        .card-header-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(0, 150, 136, 0.12);
        }

        .card-header-title {
            flex: 1;
            font-size: 16px;
            font-weight: 800;
            color: #1a1a1a;
        }

        /* Material Cards */
        .material-item {
            background: #F5F9F5;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s ease;
        }

        .material-item:active {
            transform: scale(0.99);
        }

        .material-emoji {
            font-size: 44px;
            width: 60px;
            text-align: center;
        }

        .material-info {
            flex: 1;
        }

        .material-name {
            font-size: 16px;
            font-weight: 800;
            color: #1a1a1a;
        }

        .material-stock {
            font-size: 12px;
            color: #2E7D32;
            font-weight: 700;
            margin-top: 2px;
        }

        .material-price {
            font-size: 11px;
            color: #78909C;
            margin-top: 2px;
        }

        .btn-offer {
            padding: 10px 20px;
            background: linear-gradient(135deg, #009688, #00796B);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            transition: 0.15s ease;
            box-shadow: 0 2px 8px rgba(0, 150, 136, 0.3);
        }

        .btn-offer:active {
            transform: scale(0.94);
            box-shadow: 0 1px 4px rgba(0, 150, 136, 0.3);
        }

        .btn-offer.disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
        }

        .empty-emoji {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
            color: #90A4AE;
            font-weight: 500;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #009688;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* Modal - بدون وميض */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 32px;
            padding: 28px 24px 32px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            will-change: transform, opacity;
        }

        .modal-icon {
            font-size: 52px;
            margin-bottom: 8px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 900;
            color: #00695C;
            margin: 6px 0;
        }

        .modal-desc {
            font-size: 12px;
            color: #78909C;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .modal-group {
            margin-bottom: 16px;
            text-align: right;
        }

        .modal-label {
            font-size: 11px;
            font-weight: 700;
            color: #607D8B;
            margin-bottom: 6px;
            display: block;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E8E0;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            text-align: center;
            direction: ltr;
            background: #FAFFFA;
            transition: 0.15s ease;
        }

        .modal-input:focus {
            outline: none;
            border-color: #009688;
        }

        .modal-total {
            font-size: 20px;
            font-weight: 900;
            color: #FF6F00;
            margin: 12px 0;
            padding: 10px;
            background: #FFF3E0;
            border-radius: 20px;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #009688, #00796B);
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.15s ease;
        }

        .modal-btn:active {
            transform: scale(0.97);
        }

        .btn-cancel {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: 1.5px solid #DDD;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #78909C;
            transition: 0.15s ease;
        }

        .btn-cancel:active {
            transform: scale(0.97);
            background: #F5F5F5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 400;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            pointer-events: none;
            transition: transform 0.25s ease;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 16px 20px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* Animations */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card, .material-item, .main-card {
            animation: fadeSlideUp 0.35s ease backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        .main-card { animation-delay: 0.25s; }

        /* Responsive */
        @media (max-width: 420px) {
            .stats-grid { gap: 8px; }
            .stat-card { padding: 10px 4px; }
            .stat-icon { font-size: 20px; }
            .stat-value { font-size: 18px; }
            .stat-label { font-size: 9px; }
            .material-emoji { font-size: 36px; width: 48px; }
            .btn-offer { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <!-- خلفية ثابتة -->
    <div class="bg-fixed"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Navbar -->
    <header class="top-nav">
        <a href="index.html" class="btn-back" aria-label="رجوع">←</a>
        <span class="nav-title">🏭 شركات التدوير</span>
        <button class="btn-refresh" id="refreshBtn" aria-label="تحديث">🔄</button>
    </header>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Main Content -->
    <main class="main-container">
        <!-- 4 مربعات إحصائية -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalKg">0</div>
                <div class="stat-label">كغ متاح</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalCarton">0</div>
                <div class="stat-label">كرتون</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🫙</div>
                <div class="stat-value" id="totalPlastique">0</div>
                <div class="stat-label">بلاستيك</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🫗</div>
                <div class="stat-value" id="totalVerre">0</div>
                <div class="stat-label">زجاج</div>
            </div>
        </div>

        <!-- Materials Card -->
        <div class="main-card">
            <div class="card-header">
                <div class="card-header-icon">♻️</div>
                <span class="card-header-title">المواد الجاهزة للشراء</span>
            </div>
            <div id="materialsList">
                <div class="empty-state">
                    <span class="empty-emoji">⏳</span>
                    <span class="empty-text">جاري التحميل...</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        © 2026 <strong>مدينتنا نظيفة</strong> — جميع الحقوق محفوظة
    </footer>

    <!-- Modal -->
    <div class="modal-overlay" id="offerOverlay">
        <div class="modal">
            <div class="modal-icon">💰</div>
            <div class="modal-title">تقديم عرض شراء</div>
            <div class="modal-desc" id="offerDesc"></div>
            <div class="modal-group">
                <span class="modal-label">📦 الكمية المطلوبة (كغ)</span>
                <input type="number" class="modal-input" id="offerQuantity" placeholder="0" min="1" step="1" inputmode="numeric">
            </div>
            <div class="modal-group">
                <span class="modal-label">💰 السعر المقترح (دج/كغ)</span>
                <input type="number" class="modal-input" id="offerPrice" placeholder="0" min="1" step="1" inputmode="numeric">
            </div>
            <div class="modal-total" id="offerTotal">الإجمالي: 0 دج</div>
            <button class="modal-btn" id="submitOfferBtn">📤 إرسال العرض</button>
            <button class="btn-cancel" id="closeModalBtn">إلغاء</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Supabase
        var SUPABASE_URL = 'https://ctkkkpcjwebkrcbzsvpf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc';

        var currentMaterial = null;
        var currentMaxKg = 0;
        var currentPrice = 0;
        var currentMaterialName = '';

        // DOM Elements
        var refreshBtn = document.getElementById('refreshBtn');
        var loadingOverlay = document.getElementById('loadingOverlay');
        var offerOverlay = document.getElementById('offerOverlay');
        var toast = document.getElementById('toast');
        var isRefreshing = false;

        function showLoading() { loadingOverlay.classList.add('show'); }
        function hideLoading() { loadingOverlay.classList.remove('show'); }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 2200);
        }

        // API
        function apiGet(table) {
            return new Promise(function(resolve) {
                var fields = '*';
                if (table === 'pickups') fields = 'id,material,weight,status,created_at';
                if (table === 'completed') fields = 'id,task_id';
                if (table === 'purchases') fields = 'material,quantity,status';
                
                var x = new XMLHttpRequest();
                x.open('GET', SUPABASE_URL + '/rest/v1/' + table + '?select=' + fields + '&apikey=' + SUPABASE_KEY, true);
                x.timeout = 20000;
                x.onload = function() {
                    if (x.status === 200) resolve(JSON.parse(x.responseText));
                    else resolve([]);
                };
                x.onerror = function() { resolve([]); };
                x.send();
            });
        }

        // Load Data
        async function loadData(silent) {
            if (!silent) showLoading();
            
            try {
                var completed = await apiGet('completed');
                var completedIds = completed.map(function(x) { return x.task_id; });

                var pickups = await apiGet('pickups');
                var donePickups = pickups.filter(function(x) {
                    return completedIds.indexOf('pickup_' + x.id) !== -1;
                });

                var sales = await apiGet('purchases');
                var paidSales = sales.filter(function(x) { return x.status === 'paid'; });
                
                var soldCarton = 0, soldPlastique = 0, soldVerre = 0;
                for (var i = 0; i < paidSales.length; i++) {
                    var s = paidSales[i];
                    if (s.material === 'carton') soldCarton += (s.quantity || 0);
                    if (s.material === 'plastique') soldPlastique += (s.quantity || 0);
                    if (s.material === 'verre') soldVerre += (s.quantity || 0);
                }

                var carton = donePickups.filter(function(x) { return x.material === 'carton'; });
                var plastique = donePickups.filter(function(x) { return x.material === 'plastique'; });
                var verre = donePickups.filter(function(x) { return x.material === 'verre'; });

                var kgC = carton.reduce(function(s, x) { return s + (x.weight || 0); }, 0) - soldCarton;
                var kgP = plastique.reduce(function(s, x) { return s + (x.weight || 0); }, 0) - soldPlastique;
                var kgV = verre.reduce(function(s, x) { return s + (x.weight || 0); }, 0) - soldVerre;
                
                if (kgC < 0) kgC = 0;
                if (kgP < 0) kgP = 0;
                if (kgV < 0) kgV = 0;

                // تحديث المربعات
                document.getElementById('totalKg').textContent = (kgC + kgP + kgV).toLocaleString('en-US');
                document.getElementById('totalCarton').textContent = kgC.toLocaleString('en-US');
                document.getElementById('totalPlastique').textContent = kgP.toLocaleString('en-US');
                document.getElementById('totalVerre').textContent = kgV.toLocaleString('en-US');

                // قائمة المواد
                var materials = [
                    { name: 'كرتون', emoji: '📦', kg: kgC, price: 15, mat: 'carton' },
                    { name: 'بلاستيك', emoji: '🫙', kg: kgP, price: 25, mat: 'plastique' },
                    { name: 'زجاج', emoji: '🫗', kg: kgV, price: 10, mat: 'verre' }
                ];

                var container = document.getElementById('materialsList');
                
                if (kgC + kgP + kgV === 0) {
                    container.innerHTML = '<div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد مواد متاحة حالياً</span><span class="empty-text" style="font-size:11px;margin-top:6px;">سيتم تحديث المخزون عند تأكيد الجمع</span></div>';
                } else {
                    var html = '';
                    for (var m = 0; m < materials.length; m++) {
                        var mat = materials[m];
                        var disabled = mat.kg === 0 ? 'disabled' : '';
                        var opacityStyle = mat.kg === 0 ? 'style="opacity:0.5"' : '';
                        html += '<div class="material-item" ' + opacityStyle + '>' +
                            '<span class="material-emoji">' + mat.emoji + '</span>' +
                            '<div class="material-info">' +
                            '<div class="material-name">' + mat.name + '</div>' +
                            '<div class="material-stock">📊 ' + mat.kg.toLocaleString('en-US') + ' كغ متاح</div>' +
                            '<div class="material-price">💎 السعر المرجعي: ' + mat.price + ' دج/كغ</div>' +
                            '</div>' +
                            '<button class="btn-offer" data-mat="' + mat.mat + '" data-name="' + mat.name + '" data-kg="' + mat.kg + '" data-price="' + mat.price + '" ' + disabled + '>🎯 عرض</button>' +
                            '</div>';
                    }
                    container.innerHTML = html;
                    
                    // ربط الأزرار
                    var btns = document.querySelectorAll('.btn-offer');
                    for (var b = 0; b < btns.length; b++) {
                        if (!btns[b].hasAttribute('disabled')) {
                            btns[b].addEventListener('click', function(e) {
                                var btn = e.currentTarget;
                                openOffer(btn.dataset.mat, btn.dataset.name, parseInt(btn.dataset.kg), parseInt(btn.dataset.price));
                            });
                        }
                    }
                }

                if (!silent) showToast('✅ تم تحديث البيانات');
            } catch(e) {
                console.error(e);
                if (!silent) showToast('⚠️ حدث خطأ');
            } finally {
                hideLoading();
                if (isRefreshing) {
                    setTimeout(function() {
                        refreshBtn.classList.remove('loading');
                        isRefreshing = false;
                    }, 400);
                }
            }
        }

        // Refresh
        refreshBtn.addEventListener('click', function() {
            if (isRefreshing) return;
            isRefreshing = true;
            refreshBtn.classList.add('loading');
            loadData(true);
        });

        // Open Modal
        function openOffer(mat, name, kg, price) {
            if (kg === 0) {
                showToast('⚠️ لا توجد كمية متاحة من ' + name);
                return;
            }
            
            currentMaterial = mat;
            currentMaterialName = name;
            currentMaxKg = kg;
            currentPrice = price;
            
            document.getElementById('offerDesc').innerHTML = '<strong>' + name + '</strong><br>المتاح: ' + kg.toLocaleString('en-US') + ' كغ · ' + price + ' دج/كغ';
            document.getElementById('offerQuantity').value = '';
            document.getElementById('offerPrice').value = price;
            document.getElementById('offerTotal').textContent = 'الإجمالي: 0 دج';
            
            // عرض المودال بدون وميض
            offerOverlay.classList.add('show');
        }

        function closeModal() {
            offerOverlay.classList.remove('show');
        }

        function updateTotal() {
            var qty = parseInt(document.getElementById('offerQuantity').value) || 0;
            var price = parseInt(document.getElementById('offerPrice').value) || 0;
            
            if (qty > currentMaxKg) {
                document.getElementById('offerQuantity').value = currentMaxKg;
                qty = currentMaxKg;
                showToast('⚠️ الحد الأقصى: ' + currentMaxKg + ' كغ');
            }
            
            var total = qty * price;
            document.getElementById('offerTotal').textContent = 'الإجمالي: ' + total.toLocaleString('en-US') + ' دج';
        }

        function submitOffer() {
            var qty = parseInt(document.getElementById('offerQuantity').value) || 0;
            var price = parseInt(document.getElementById('offerPrice').value) || 0;
            
            if (!qty || qty <= 0) { showToast('⚠️ أدخل الكمية'); return; }
            if (!price || price <= 0) { showToast('⚠️ أدخل السعر'); return; }
            if (qty > currentMaxKg) { showToast('⚠️ الكمية تتجاوز المخزون'); return; }
            
            showLoading();
            
            var xhr = new XMLHttpRequest();
            xhr.open('POST', SUPABASE_URL + '/rest/v1/purchases?apikey=' + SUPABASE_KEY, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.setRequestHeader('Prefer', 'return=minimal');
            
            xhr.onload = function() {
                hideLoading();
                if (xhr.status === 201) {
                    closeModal();
                    showToast('✅ تم إرسال العرض بنجاح!');
                    setTimeout(function() { loadData(true); }, 1000);
                } else {
                    showToast('❌ خطأ: ' + xhr.status);
                }
            };
            xhr.onerror = function() { hideLoading(); showToast('❌ خطأ في الاتصال'); };
            xhr.send(JSON.stringify({ material: currentMaterial, quantity: qty, price_per_kg: price, status: 'pending' }));
        }

        // ربط الأحداث
        document.getElementById('offerQuantity').addEventListener('input', updateTotal);
        document.getElementById('offerPrice').addEventListener('input', updateTotal);
        document.getElementById('submitOfferBtn').addEventListener('click', submitOffer);
        document.getElementById('closeModalBtn').addEventListener('click', closeModal);
        
        // إغلاق المودال بالضغط على الخلفية
        offerOverlay.addEventListener('click', function(e) {
            if (e.target === offerOverlay) closeModal();
        });
        
        // ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && offerOverlay.classList.contains('show')) closeModal();
        });

        // Start
        loadData(false);
    </script>
</body>
</html>
