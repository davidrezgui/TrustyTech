<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركات التدوير | مدينتنا نظيفة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2E7D32; --primary-dark: #1B5E20; --accent: #FF6F00; --teal: #009688; --danger: #E53935; --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F; --radius: 20px; --radius-sm: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 28px rgba(0,0,0,0.12); --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: linear-gradient(160deg, #0d260d 0%, #061406 100%); }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: rgba(0,150,136,0.08); top: -8%; right: -8%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(46,125,50,0.08); bottom: -10%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
        .btn-back { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 15px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .nav-title { flex: 1; font-size: 15px; font-weight: 700; color: white; }
        .main-container { position: relative; z-index: 1; flex: 1; padding: 74px 12px 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,150,136,0.08); padding: 12px 6px; border-radius: var(--radius-sm); text-align: center; border: 1px solid rgba(0,150,136,0.12); }
        .stat-value { font-size: 20px; font-weight: 900; color: #00695C; direction: ltr; }
        .stat-label { font-size: 9px; color: var(--text-gray); margin-top: 2px; }
        .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 16px 14px; box-shadow: var(--shadow); margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.12); animation: cardIn 0.5s ease; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; background: #E0F2F1; }
        .card-label { flex: 1; font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .material-card { background: white; border-radius: var(--radius-sm); padding: 14px; margin-bottom: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.03); display: flex; align-items: center; gap: 10px; }
        .material-emoji { font-size: 32px; }
        .material-info { flex: 1; }
        .material-name { font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .material-detail { font-size: 10px; color: var(--text-gray); }
        .btn-offer { padding: 8px 14px; background: var(--teal); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 11px; }
        .empty-state { text-align: center; padding: 20px; } .empty-emoji { font-size: 36px; } .empty-text { font-size: 11px; color: var(--text-gray); }
        .footer { position: relative; z-index: 1; text-align: center; padding: 6px 14px; font-size: 8px; color: rgba(255,255,255,0.4); }
        .overlay { position: fixed; top:0;left:0;width:100%;height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .overlay.show { display: flex; }
        .modal { background: white; border-radius: var(--radius); padding: 28px 22px 24px; text-align: center; max-width: 340px; width: 100%; animation: spring 0.6s ease; }
        @keyframes spring { 0% { transform: scale(0.6) translateY(30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-icon { font-size: 50px; } .modal-title { font-size: 17px; font-weight: 900; color: var(--primary-dark); margin: 6px 0; }
        .modal-desc { font-size: 11px; color: var(--text-gray); margin-bottom: 14px; }
        .modal-input { width: 100%; padding: 11px; border: 2px solid #e0e0e0; border-radius: var(--radius-sm); font-family: 'Cairo', sans-serif; font-size: 13px; text-align: center; direction: ltr; margin-bottom: 8px; }
        .modal-label { font-size: 10px; color: var(--text-gray); margin-bottom: 3px; display: block; }
        .modal-btn { width: 100%; padding: 11px; border: none; border-radius: var(--radius-sm); background: var(--teal); color: white; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; }
        .btn-cancel { margin-top:6px;width:100%;padding:9px;border:1.5px solid #e0e0e0;border-radius:20px;background:white;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text-gray); }
    </style>
</head>
<body>
    <div class="particles-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <header class="top-nav">
        <a href="index.html" class="btn-back">←</a>
        <span class="nav-title">🏭 شركات التدوير</span>
    </header>
    <main class="main-container">
        <div class="stat-row">
            <div class="stat-box"><span class="stat-value" id="totalKg">0</span><div class="stat-label">كغ متاح</div></div>
            <div class="stat-box"><span class="stat-value" id="totalCarton">0</span><div class="stat-label">كرتون</div></div>
            <div class="stat-box"><span class="stat-value" id="totalPlastique">0</span><div class="stat-label">بلاستيك</div></div>
        </div>
        <div class="card">
            <div class="card-header"><div class="card-icon">📦</div><span class="card-label">المواد الجاهزة للشراء</span></div>
            <div id="materialsList"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد مواد متاحة حالياً</span></div></div>
        </div>
    </main>
    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <div class="overlay" id="offerOverlay">
        <div class="modal">
            <div class="modal-icon">💰</div>
            <div class="modal-title">تقديم عرض شراء</div>
            <div class="modal-desc" id="offerDesc"></div>
            <span class="modal-label">الكمية المطلوبة (كغ)</span>
            <input type="number" class="modal-input" id="offerQuantity" placeholder="الكمية (كغ)" min="1" oninput="updateTotal()">
            <span class="modal-label">السعر المقترح (دج/كغ)</span>
            <input type="number" class="modal-input" id="offerPrice" placeholder="السعر (دج/كغ)" oninput="updateTotal()">
            <div style="font-size:15px;font-weight:900;color:var(--accent);margin:6px 0;" id="offerTotal">الإجمالي: 0 دج</div>
            <button class="modal-btn" onclick="submitOffer()">📤 إرسال العرض</button>
            <button class="btn-cancel" onclick="document.getElementById('offerOverlay').classList.remove('show')">إلغاء</button>
        </div>
    </div>

    <script>
        var SUPABASE_URL = 'https://ctkkkpcjwebkrcbzsvpf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc';

        var currentMaterial=null,currentMaxKg=0,currentPrice=0;

        function apiGet(table){
            return new Promise(function(resolve){
                var fields='*';
                if(table==='pickups')fields='id,material,weight,status,created_at';
                if(table==='completed')fields='id,task_id';
                if(table==='purchases')fields='material,quantity,status';
                var x=new XMLHttpRequest();
                x.open('GET',SUPABASE_URL+'/rest/v1/'+table+'?select='+fields+'&apikey='+SUPABASE_KEY,true);
                x.timeout=25000;x.onload=function(){if(x.status===200)resolve(JSON.parse(x.responseText));else resolve([]);};x.onerror=function(){resolve([]);};x.send();
            });
        }

        async function loadData(){
            try{
                var completed=await apiGet('completed');
                var completedIds=completed.map(function(x){return x.task_id;});

                var pickups=await apiGet('pickups');
                var donePickups=pickups.filter(function(x){return completedIds.indexOf('pickup_'+x.id)!==-1;});

                var sales=await apiGet('purchases');
                var paidSales=sales.filter(function(x){return x.status==='paid';});
                var soldCarton=0,soldPlastique=0,soldVerre=0;
                paidSales.forEach(function(x){
                    if(x.material==='carton')soldCarton+=(x.quantity||0);
                    if(x.material==='plastique')soldPlastique+=(x.quantity||0);
                    if(x.material==='verre')soldVerre+=(x.quantity||0);
                });

                var carton=donePickups.filter(function(x){return x.material==='carton';});
                var plastique=donePickups.filter(function(x){return x.material==='plastique';});
                var verre=donePickups.filter(function(x){return x.material==='verre';});

                var kgC=carton.reduce(function(s,x){return s+(x.weight||0);},0)-soldCarton;if(kgC<0)kgC=0;
                var kgP=plastique.reduce(function(s,x){return s+(x.weight||0);},0)-soldPlastique;if(kgP<0)kgP=0;
                var kgV=verre.reduce(function(s,x){return s+(x.weight||0);},0)-soldVerre;if(kgV<0)kgV=0;

                document.getElementById('totalKg').textContent=(kgC+kgP+kgV).toLocaleString('en-US');
                document.getElementById('totalCarton').textContent=kgC.toLocaleString('en-US');
                document.getElementById('totalPlastique').textContent=kgP.toLocaleString('en-US');

                var list=[{name:'كرتون',emoji:'📦',kg:kgC,price:15,mat:'carton'},{name:'بلاستيك',emoji:'🫙',kg:kgP,price:25,mat:'plastique'},{name:'زجاج',emoji:'🫗',kg:kgV,price:10,mat:'verre'}];
                var ml=document.getElementById('materialsList');
                if(kgC+kgP+kgV===0){ml.innerHTML='<div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد مواد متاحة حالياً</span></div>';}
                else{ml.innerHTML=list.map(function(m){return'<div class="material-card"><span class="material-emoji">'+m.emoji+'</span><div class="material-info"><div class="material-name">'+m.name+'</div><div class="material-detail">'+m.kg+' كغ متاح · السعر المرجعي: '+m.price+' دج/كغ</div></div><button class="btn-offer" onclick="openOffer(\''+m.mat+'\',\''+m.name+'\','+m.kg+','+m.price+')">🎯 عرض</button></div>';}).join('');}
            }catch(e){}
        }

        function openOffer(mat,name,kg,price){
            currentMaterial=mat;currentMaxKg=kg;currentPrice=price;
            document.getElementById('offerDesc').innerHTML='<strong>'+name+'</strong> · المتاح: '+kg+' كغ · السعر المرجعي: '+price+' دج/كغ';
            document.getElementById('offerQuantity').value='';document.getElementById('offerPrice').value=price;
            document.getElementById('offerQuantity').max=kg;document.getElementById('offerTotal').textContent='الإجمالي: 0 دج';
            document.getElementById('offerOverlay').classList.add('show');
        }

        function updateTotal(){
            var qty=parseInt(document.getElementById('offerQuantity').value)||0;
            var price=parseInt(document.getElementById('offerPrice').value)||0;
            if(qty>currentMaxKg){document.getElementById('offerQuantity').value=currentMaxKg;qty=currentMaxKg;alert('الكمية لا يمكن أن تتجاوز '+currentMaxKg+' كغ');}
            document.getElementById('offerTotal').textContent='الإجمالي: '+(qty*price).toLocaleString('en-US')+' دج';
        }

        function submitOffer(){
            var qty=parseInt(document.getElementById('offerQuantity').value)||0;
            var price=parseInt(document.getElementById('offerPrice').value)||0;
            if(!qty||qty<=0){alert('الرجاء إدخال الكمية');return;}
            if(!price||price<=0){alert('الرجاء إدخال السعر');return;}
            if(qty>currentMaxKg){alert('الكمية تتجاوز المخزون المتاح');return;}
            var xhr=new XMLHttpRequest();
            xhr.open('POST',SUPABASE_URL+'/rest/v1/purchases?apikey='+SUPABASE_KEY,true);
            xhr.setRequestHeader('Content-Type','application/json');xhr.setRequestHeader('Prefer','return=minimal');
            xhr.onload=function(){if(xhr.status===201){document.getElementById('offerOverlay').classList.remove('show');alert('✅ تم إرسال العرض بنجاح!');}else{alert('❌ خطأ: '+xhr.status);}};
            xhr.send(JSON.stringify({material:currentMaterial,quantity:qty,price_per_kg:price,status:'pending'}));
        }

        loadData();
    </script>
</body>
</html>
