<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكافآت | مدينتنا نظيفة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50; --accent: #FF6F00; --danger: #E53935; --gold: #FFD700; --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F; --radius: 20px; --radius-sm: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-lg: 0 8px 28px rgba(0,0,0,0.12); --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: linear-gradient(160deg, #0d260d 0%, #061406 100%); }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: rgba(255,215,0,0.08); top: -8%; right: -8%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(46,125,50,0.08); bottom: -10%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
        .btn-back { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 15px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        .nav-title { flex: 1; font-size: 15px; font-weight: 700; color: white; }
        .main { position: relative; z-index: 1; flex: 1; padding: 74px 14px 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .points-bar { background: linear-gradient(135deg, #FFD700, #FFA726); border-radius: var(--radius); padding: 16px; color: white; text-align: center; margin-bottom: 12px; animation: cardIn 0.5s ease; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .points-bar .label { font-size: 11px; opacity: 0.9; }
        .points-bar .value { font-size: 36px; font-weight: 900; direction: ltr; }
        .reward-card { background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 16px; margin-bottom: 8px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; gap: 12px; transition: var(--transition); }
        .reward-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .reward-icon { font-size: 36px; width: 50px; text-align: center; }
        .reward-info { flex: 1; }
        .reward-name { font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .reward-desc { font-size: 10px; color: var(--text-gray); margin-top: 2px; }
        .reward-cost { font-size: 12px; font-weight: 800; color: var(--accent); direction: ltr; }
        .btn-redeem { padding: 8px 16px; border: none; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; background: var(--primary); color: white; transition: var(--transition); white-space: nowrap; }
        .btn-redeem:hover { background: var(--primary-dark); }
        .btn-redeem:disabled { background: #ccc; cursor: not-allowed; }
        .msg { padding: 10px; border-radius: var(--radius-sm); font-size: 11px; text-align: center; margin-top: 8px; display: none; }
        .msg-success { background: #E8F5E9; color: var(--primary); }
        .msg-error { background: #FFEBEE; color: var(--danger); }
        .footer { position: relative; z-index: 1; text-align: center; padding: 6px 14px; font-size: 8px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="particles-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <header class="top-nav">
        <a href="home.html" class="btn-back">←</a>
        <span class="nav-title">🎁 المكافآت</span>
    </header>
    <main class="main">
        <div class="points-bar"><div class="label">⭐ رصيد نقاطك</div><div class="value" id="pointsDisplay">0</div></div>
        <div id="rewardsList"></div>
        <div class="msg msg-success" id="successMsg">✅ تم استبدال المكافأة بنجاح! سيتواصل معك المشرف قريباً</div>
        <div class="msg msg-error" id="errorMsg"></div>
    </main>
    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <script>
        var SUPABASE_URL = 'https://ctkkkpcjwebkrcbzsvpf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc';
        var myPoints = 0;
        var userEmail = localStorage.getItem('userEmail'); // البريد من localStorage

        var rewards = [
            { id: 1, icon: '🗑️', name: 'كيس قمامة', desc: 'كيس متين 50 لتر', cost: 100 },
            { id: 2, icon: '🧤', name: 'زوج قفازات', desc: 'قفازات حماية', cost: 200 },
            { id: 3, icon: '🪣', name: 'حاوية فرز صغيرة', desc: 'للمطبخ 20 لتر', cost: 500 },
            { id: 4, icon: '🎫', name: 'قسيمة شرائية', desc: 'للمواد الغذائية', cost: 1000 },
            { id: 5, icon: '♻️', name: 'حاوية فرز كبيرة', desc: 'للمنزل 50 لتر', cost: 2000 },
            { id: 6, icon: '🏆', name: 'شهادة تقدير', desc: 'مواطن بيئي نشط', cost: 3000 }
        ];

        function loadPoints(){
            if(!userEmail){ showPointsAndRewards(); return; }
            var x = new XMLHttpRequest();
            x.open('GET', SUPABASE_URL + '/rest/v1/point_transactions?select=amount&user_email=eq.' + encodeURIComponent(userEmail) + '&apikey=' + SUPABASE_KEY, true);
            x.timeout = 15000;
            x.onload = function(){
                myPoints = 0;
                if(x.status === 200){
                    var data = JSON.parse(x.responseText);
                    myPoints = data.reduce(function(s, r){ return s + (r.amount || 0); }, 0);
                }
                if(myPoints < 0) myPoints = 0;
                showPointsAndRewards();
            };
            x.onerror = function(){ showPointsAndRewards(); };
            x.send();
        }

        function showPointsAndRewards(){
            document.getElementById('pointsDisplay').textContent = myPoints.toLocaleString('en-US');
            document.getElementById('rewardsList').innerHTML = rewards.map(function(r){
                var canRedeem = myPoints >= r.cost;
                return '<div class="reward-card">' +
                    '<span class="reward-icon">' + r.icon + '</span>' +
                    '<div class="reward-info"><div class="reward-name">' + r.name + '</div><div class="reward-desc">' + r.desc + '</div></div>' +
                    '<div class="reward-cost">' + r.cost.toLocaleString('en-US') + ' نقطة</div>' +
                    '<button class="btn-redeem" ' + (canRedeem ? '' : 'disabled') + ' onclick="redeem(' + r.id + ',' + r.cost + ',\'' + r.name + '\')">' + (canRedeem ? 'استبدال' : 'غير كافٍ') + '</button>' +
                '</div>';
            }).join('');
        }

        function redeem(id, cost, name){
            if(myPoints < cost) return;
            if(!confirm('استبدال ' + name + ' بـ ' + cost + ' نقطة؟')) return;

            // خصم النقاط
            var xhr1 = new XMLHttpRequest();
            xhr1.open('POST', SUPABASE_URL + '/rest/v1/point_transactions?apikey=' + SUPABASE_KEY, true);
            xhr1.setRequestHeader('Content-Type', 'application/json');
            xhr1.setRequestHeader('Prefer', 'return=minimal');
            xhr1.send(JSON.stringify({ user_email: userEmail, amount: -cost, description: 'استبدال: ' + name }));

            // تسجيل الطلب
            var xhr2 = new XMLHttpRequest();
            xhr2.open('POST', SUPABASE_URL + '/rest/v1/redeems?apikey=' + SUPABASE_KEY, true);
            xhr2.setRequestHeader('Content-Type', 'application/json');
            xhr2.setRequestHeader('Prefer', 'return=minimal');
            xhr2.send(JSON.stringify({ user_email: userEmail, reward_name: name, cost: cost, status: 'pending' }));

            // إشعار للمشرف
            var xhr3 = new XMLHttpRequest();
            xhr3.open('POST', SUPABASE_URL + '/rest/v1/notifications?apikey=' + SUPABASE_KEY, true);
            xhr3.setRequestHeader('Content-Type', 'application/json');
            xhr3.setRequestHeader('Prefer', 'return=minimal');
            xhr3.send(JSON.stringify({ title: 'طلب مكافأة جديد', message: userEmail + ' استبدل ' + name + ' بـ ' + cost + ' نقطة', type: 'info', is_read: false }));

            // تحديث العرض
            myPoints -= cost;
            document.getElementById('pointsDisplay').textContent = myPoints.toLocaleString('en-US');
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(function(){ document.getElementById('successMsg').style.display = 'none'; showPointsAndRewards(); }, 2500);
        }

        loadPoints();
    </script>
</body>
</html>
