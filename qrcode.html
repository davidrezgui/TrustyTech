<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طباعة QR Codes | مدينتنا نظيفة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50;
            --accent: #FF6F00; --info: #1E88E5; --purple: #7B1FA2;
            --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F; --bg-card: rgba(255,255,255,0.94);
            --radius: 20px; --radius-sm: 12px;
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: rgba(123,31,162,0.10); top: -8%; right: -8%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(30,136,229,0.08); bottom: -12%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(25px,-25px) scale(1.1); } 66% { transform: translate(-15px,15px) scale(0.9); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
        .btn-back { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: var(--transition); text-decoration: none; }
        .btn-back:hover { background: rgba(255,255,255,0.12); }
        .nav-title { flex: 1; font-size: 17px; font-weight: 800; color: white; }
        .main-container { position: relative; z-index: 1; flex: 1; padding: 82px 16px 30px; max-width: 650px; margin: 0 auto; width: 100%; }
        .card { background: var(--bg-card); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 22px 20px; box-shadow: var(--shadow); margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.12); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .card-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 19px; background: #F3E5F5; }
        .card-label { flex: 1; font-size: 15px; font-weight: 800; color: var(--text-dark); }
        .badge { font-size: 11px; padding: 5px 12px; border-radius: 14px; font-weight: 700; background: #F3E5F5; color: var(--purple); }
        .task-list { display: flex; flex-direction: column; gap: 8px; max-height: 350px; overflow-y: auto; margin-bottom: 14px; }
        .task-option { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); border: 2px solid transparent; background: rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); }
        .task-option:hover { background: rgba(123,31,162,0.04); border-color: rgba(123,31,162,0.2); }
        .task-option.selected { background: rgba(123,31,162,0.08); border-color: var(--purple); }
        .task-option input[type="checkbox"] { display: none; }
        .task-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .dot-report { background: #E53935; } .dot-pickup { background: #FF9800; }
        .task-info { flex: 1; }
        .task-name { font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .task-detail { font-size: 10px; color: var(--text-gray); }
        .select-all { font-size: 11px; color: var(--purple); cursor: pointer; font-weight: 700; margin-bottom: 8px; display: inline-block; }
        .select-all:hover { text-decoration: underline; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; color: white; transition: var(--transition); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-generate { background: linear-gradient(135deg, #7B1FA2, #9C27B0); box-shadow: 0 8px 24px rgba(123,31,162,0.3); }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(123,31,162,0.4); }
        .btn-print { background: var(--info); box-shadow: 0 8px 24px rgba(30,136,229,0.3); }
        .btn-print:hover { transform: translateY(-2px); }
        .btn-clear { background: transparent; border: 2px solid var(--danger); color: var(--danger); }
        .btn-clear:hover { background: rgba(229,57,53,0.06); }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
        .qr-item { background: white; border-radius: var(--radius-sm); padding: 16px 10px; text-align: center; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.04); page-break-inside: avoid; }
        .qr-item canvas, .qr-item img { display: block; margin: 0 auto 8px; border: 1px solid #eee; border-radius: 8px; padding: 6px; background: white; }
        .qr-label { font-size: 12px; font-weight: 800; color: var(--text-dark); margin-bottom: 3px; }
        .qr-sublabel { font-size: 10px; color: var(--text-gray); direction: ltr; }
        .empty-state { text-align: center; padding: 32px; }
        .empty-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
        .empty-text { font-size: 13px; color: var(--text-gray); font-weight: 600; }
        .footer { position: relative; z-index: 1; text-align: center; padding: 10px 20px; font-size: 10px; color: rgba(255,255,255,0.4); background: linear-gradient(transparent, rgba(0,0,0,0.3)); }
        .hidden { display: none; }
        @media print {
            body { background: white; }
            .particles-bg, .orb, .top-nav, .footer, .card:first-of-type, .btn, .select-all { display: none !important; }
            .main-container { padding: 0; max-width: 100%; }
            .card { box-shadow: none; border: none; background: white; }
            .qr-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .qr-item { box-shadow: none; border: 1px dashed #ccc; }
        }
        .qr-size-control { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .qr-size-control label { font-size: 12px; font-weight: 700; color: var(--text-dark); }
        .qr-size-control select { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 12px; }
    </style>
</head>
<body>

    <div class="particles-bg" id="particlesBg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="top-nav">
        <a href="dashboard.html" class="btn-back">←</a>
        <span class="nav-title">📱 طباعة QR Codes</span>
    </header>

    <main class="main-container">
        
        <!-- اختيار المهام -->
        <div class="card" id="selectCard">
            <div class="card-header">
                <div class="card-icon">📋</div>
                <span class="card-label">اختر المهام للطباعة</span>
                <span class="badge" id="selectedCount">0</span>
            </div>
            
            <span class="select-all" onclick="selectAllTasks()">✅ تحديد الكل</span>
            <span class="select-all" style="margin-right:12px;color:var(--danger);" onclick="deselectAllTasks()">❌ إلغاء الكل</span>
            
            <div class="task-list" id="taskList">
                <div class="empty-state"><span class="empty-emoji">⏳</span><span class="empty-text">جاري تحميل المهام...</span></div>
            </div>

            <div class="qr-size-control">
                <label>📐 حجم QR:</label>
                <select id="qrSize" onchange="generateQRCodes()">
                    <option value="120">صغير (120px)</option>
                    <option value="160" selected>متوسط (160px)</option>
                    <option value="200">كبير (200px)</option>
                </select>
            </div>

            <button class="btn btn-generate" onclick="generateQRCodes()">🎯 توليد QR Codes للمحدد</button>
            <button class="btn btn-clear" onclick="clearAll()">🗑️ مسح الكل</button>
        </div>

        <!-- منطقة العرض -->
        <div class="card hidden" id="printCard">
            <div class="card-header">
                <div class="card-icon" style="background:#E8EAF6;">🖨️</div>
                <span class="card-label">QR Codes جاهزة للطباعة</span>
                <span class="badge" style="background:#E8EAF6;color:#283593;" id="printCount">0</span>
            </div>
            <div class="qr-grid" id="qrGrid"></div>
            <button class="btn btn-print" onclick="window.print()">🖨️ طباعة جميع QR Codes</button>
            <button class="btn btn-clear" onclick="backToSelect()">↩️ العودة للاختيار</button>
        </div>

    </main>

    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function(){var c=document.getElementById('particlesBg');var colors=['#7B1FA2','#9C27B0','#BA68C8','#E1BEE7'];for(var i=0;i<20;i++){var p=document.createElement('div');p.className='particle';var s=Math.random()*4+2;p.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*10+8)+'s;animation-delay:'+Math.random()*8+'s;';c.appendChild(p);}})();

        var sb = window.supabase.createClient('https://ctkkkpcjwebkrcbzsvpf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc');
        
        var allTasks = [];

        function formatDateDZ(isoString) {
            if (!isoString) return '--/--/----';
            var d = new Date(isoString);
            return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
        }

        function loadTasks() {
            Promise.all([
                sb.from('reports').select('*'),
                sb.from('pickups').select('*')
            ]).then(function(results) {
                allTasks = [];
                
                if (!results[0].error) {
                    results[0].data.forEach(function(r) {
                        allTasks.push({
                            id: 'report_' + r.id,
                            label: '🚨 مفرغة - ' + (r.type || 'غير محدد'),
                            detail: formatDateDZ(r.created_at) + ' | ' + (r.lat ? r.lat.toFixed(4) : '--') + ', ' + (r.lng ? r.lng.toFixed(4) : '--'),
                            type: 'report',
                            taskId: r.id
                        });
                    });
                }
                
                if (!results[1].error) {
                    results[1].data.forEach(function(r) {
                        var matNames = {carton:'كرتون', plastique:'بلاستيك', verre:'زجاج'};
                        allTasks.push({
                            id: 'pickup_' + r.id,
                            label: '📦 جمع ' + (matNames[r.material] || r.material || 'مواد') + ' - ' + (r.weight || 0) + ' كغ',
                            detail: formatDateDZ(r.created_at) + ' | ' + (r.lat ? r.lat.toFixed(4) : '--') + ', ' + (r.lng ? r.lng.toFixed(4) : '--'),
                            type: 'pickup',
                            taskId: r.id
                        });
                    });
                }

                renderTaskList();
            }).catch(function(e) {
                document.getElementById('taskList').innerHTML = '<div class="empty-state"><span class="empty-emoji">⚠️</span><span class="empty-text">تعذر تحميل المهام</span></div>';
            });
        }

        function renderTaskList() {
            var container = document.getElementById('taskList');
            if (allTasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا توجد مهام متاحة</span></div>';
                return;
            }
            
            container.innerHTML = allTasks.map(function(t, i) {
                return '<label class="task-option" id="taskRow_' + i + '">' +
                    '<input type="checkbox" onchange="updateSelection()" data-index="' + i + '">' +
                    '<span class="task-dot ' + (t.type === 'report' ? 'dot-report' : 'dot-pickup') + '"></span>' +
                    '<div class="task-info">' +
                        '<div class="task-name">' + t.label + '</div>' +
                        '<div class="task-detail">' + t.detail + ' | ' + t.id + '</div>' +
                    '</div>' +
                '</label>';
            }).join('');
        }

        function selectAllTasks() {
            var checks = document.querySelectorAll('#taskList input[type="checkbox"]');
            checks.forEach(function(c) { c.checked = true; });
            updateSelection();
        }

        function deselectAllTasks() {
            var checks = document.querySelectorAll('#taskList input[type="checkbox"]');
            checks.forEach(function(c) { c.checked = false; });
            updateSelection();
        }

        function updateSelection() {
            var checks = document.querySelectorAll('#taskList input[type="checkbox"]');
            var count = 0;
            checks.forEach(function(c, i) {
                var row = document.getElementById('taskRow_' + i);
                if (c.checked) {
                    count++;
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });
            document.getElementById('selectedCount').textContent = count;
        }

        function getSelectedTasks() {
            var checks = document.querySelectorAll('#taskList input[type="checkbox"]');
            var selected = [];
            checks.forEach(function(c, i) {
                if (c.checked && allTasks[i]) {
                    selected.push(allTasks[i]);
                }
            });
            return selected;
        }

        function generateQRCodes() {
            var selected = getSelectedTasks();
            if (selected.length === 0) {
                alert('⚠️ الرجاء تحديد مهمة واحدة على الأقل');
                return;
            }

            document.getElementById('selectCard').classList.add('hidden');
            document.getElementById('printCard').classList.remove('hidden');
            document.getElementById('printCount').textContent = selected.length;

            var grid = document.getElementById('qrGrid');
            grid.innerHTML = '';
            var size = parseInt(document.getElementById('qrSize').value);

            selected.forEach(function(task) {
                var wrapper = document.createElement('div');
                wrapper.className = 'qr-item';
                
                var qrDiv = document.createElement('div');
                qrDiv.style.display = 'inline-block';
                
                new QRCode(qrDiv, {
                    text: task.id,
                    width: size,
                    height: size,
                    colorDark: '#1B5E20',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                
                wrapper.appendChild(qrDiv);
                
                var label = document.createElement('div');
                label.className = 'qr-label';
                label.textContent = task.label;
                wrapper.appendChild(label);
                
                var sublabel = document.createElement('div');
                sublabel.className = 'qr-sublabel';
                sublabel.textContent = task.id;
                wrapper.appendChild(sublabel);
                
                grid.appendChild(wrapper);
            });
        }

        function clearAll() {
            if (confirm('هل أنت متأكد من مسح جميع QR Codes؟')) {
                document.getElementById('qrGrid').innerHTML = '';
                backToSelect();
                deselectAllTasks();
            }
        }

        function backToSelect() {
            document.getElementById('selectCard').classList.remove('hidden');
            document.getElementById('printCard').classList.add('hidden');
        }

        loadTasks();
    </script>
</body>
</html>
