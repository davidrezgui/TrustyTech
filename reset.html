<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | مدينتنا نظيفة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50; --white: #FFFFFF; --text-gray: #90A4AE; --danger: #E53935; --radius: 20px; --radius-sm: 12px; --shadow-xl: 0 20px 60px rgba(0,0,0,0.2); --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-gray); overflow-x: hidden; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: rgba(46,125,50,0.10); top: -8%; right: -8%; }
        .orb-2 { width: 250px; height: 250px; background: rgba(30,136,229,0.08); bottom: -10%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
        .card { position: relative; z-index: 1; width: 100%; max-width: 400px; background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); border-radius: var(--radius); padding: 32px 24px; text-align: center; box-shadow: var(--shadow-xl); border: 1px solid rgba(255,255,255,0.2); animation: cardIn 0.5s ease both; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card-icon { font-size: 50px; margin-bottom: 6px; }
        .card h2 { font-size: 19px; font-weight: 900; color: var(--primary-dark); margin-bottom: 6px; }
        .card p { font-size: 12px; color: var(--text-gray); margin-bottom: 16px; line-height: 1.6; }
        .card input { width: 100%; padding: 13px; border: 2px solid #e0e0e0; border-radius: var(--radius-sm); font-size: 14px; font-family: 'Cairo', sans-serif; margin-bottom: 10px; direction: ltr; text-align: center; transition: var(--transition); }
        .card input:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: 13px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; color: white; background: linear-gradient(135deg, var(--primary), var(--primary-light)); box-shadow: 0 6px 20px rgba(46,125,50,0.3); transition: var(--transition); }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: wait; }
        .msg { font-size: 11px; margin-top: 10px; display: none; padding: 8px 12px; border-radius: 8px; }
        .msg-success { display: none; color: var(--primary); background: #E8F5E9; }
        .msg-error { display: none; color: var(--danger); background: #FFEBEE; }
        .back-link { display: block; margin-top: 14px; font-size: 12px; color: #1E88E5; text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="particles-bg" id="particlesBg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
        <div class="card-icon">🔑</div>
        <h2>استعادة كلمة المرور</h2>
        <p>أدخل بريدك الإلكتروني لتتلقى رابط إعادة تعيين كلمة المرور</p>
        <input type="email" id="resetEmail" placeholder="البريد الإلكتروني" dir="ltr">
        <button class="btn" id="resetBtn" onclick="resetPassword()">📩 إرسال رابط الاستعادة</button>
        <p class="msg msg-success" id="successMsg">✅ تم الإرسال! تفقد بريدك الإلكتروني</p>
        <p class="msg msg-error" id="errorMsg"></p>
        <a href="login.html" class="back-link">← العودة لتسجيل الدخول</a>
    </div>

    <script>
        var SUPABASE_URL = 'https://ctkkkpcjwebkrcbzsvpf.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        (function(){var c=document.getElementById('particlesBg');var colors=['#4CAF50','#81C784','#FFA726'];for(var i=0;i<18;i++){var p=document.createElement('div');p.className='particle';var s=Math.random()*4+2;p.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*8+8)+'s;animation-delay:'+Math.random()*6+'s;';c.appendChild(p);}})();

        async function resetPassword(){
            var email = document.getElementById('resetEmail').value.trim();
            var btn = document.getElementById('resetBtn');
            var successMsg = document.getElementById('successMsg');
            var errorMsg = document.getElementById('errorMsg');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            if(!email || email.indexOf('@') === -1 || email.indexOf('.') === -1){
                errorMsg.textContent = '❌ الرجاء إدخال بريد إلكتروني صحيح';
                errorMsg.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '⏳ جاري الإرسال...';
            
            var result = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://davidrezgui.github.io/school-/login.html'
            });
            
            btn.disabled = false;
            btn.textContent = '📩 إرسال رابط الاستعادة';
            
            if(result.error){
                errorMsg.textContent = '❌ ' + result.error.message;
                errorMsg.style.display = 'block';
            } else {
                successMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
