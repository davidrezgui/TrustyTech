<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | مدينتنا نظيفة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50;
            --white: #FFFFFF; --text-gray: #90A4AE; --danger: #E53935;
            --radius: 24px; --radius-sm: 14px;
            --shadow-xl: 0 30px 80px rgba(0,0,0,0.25);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-gray); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .bg { position: fixed; top:0;left:0;width:100%;height:100%;z-index:0;background:linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .card {
            position: relative; z-index: 1; width: 100%; max-width: 400px;
            background: rgba(255,255,255,0.94); backdrop-filter: blur(30px);
            border-radius: var(--radius); padding: 36px 24px; text-align: center;
            box-shadow: var(--shadow-xl); border: 1px solid rgba(255,255,255,0.25);
        }
        .card h2 { font-size: 20px; font-weight: 900; color: var(--primary-dark); margin-bottom: 8px; }
        .card p { font-size: 13px; color: var(--text-gray); margin-bottom: 16px; }
        .card input {
            width: 100%; padding: 14px; border: 2px solid #e0e0e0;
            border-radius: var(--radius-sm); font-size: 15px; font-family: 'Cairo', sans-serif;
            margin-bottom: 10px; direction: ltr; text-align: center; transition: var(--transition);
        }
        .card input:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: 'Cairo', sans-serif; color: white;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            box-shadow: 0 8px 24px rgba(46,125,50,0.35); transition: var(--transition);
        }
        .btn:hover { transform: translateY(-2px); }
        .msg { font-size: 11px; margin-top: 10px; display: none; }
        .msg-success { color: var(--primary); }
        .msg-error { color: var(--danger); }
        .back-link { display: block; margin-top: 14px; font-size: 12px; color: #1E88E5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="card">
        <div style="font-size:45px;margin-bottom:8px;">🔑</div>
        <h2>استعادة كلمة المرور</h2>
        <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً</p>
        <input type="email" id="resetEmail" placeholder="البريد الإلكتروني">
        <button class="btn" onclick="resetPassword()">إرسال الرابط</button>
        <p class="msg msg-success" id="successMsg">✅ تم الإرسال! تفقد بريدك الإلكتروني</p>
        <p class="msg msg-error" id="errorMsg">❌ حدث خطأ</p>
        <a href="login.html" class="back-link">← العودة لتسجيل الدخول</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var sb = window.supabase.createClient('https://ctkkkpcjwebkrcbzsvpf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc');

        async function resetPassword(){
            var email = document.getElementById('resetEmail').value;
            if(!email){return;}
            var result = await sb.auth.resetPasswordForEmail(email, {redirectTo: window.location.origin+'/login.html'});
            if(result.error){
                document.getElementById('errorMsg').style.display='block';
                document.getElementById('errorMsg').textContent = result.error.message;
            } else {
                document.getElementById('successMsg').style.display='block';
                document.getElementById('errorMsg').style.display='none';
            }
        }
    </script>
</body>
</html>
