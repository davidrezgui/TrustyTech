<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدينتنا نظيفة | منصة وطنية للاقتصاد الأخضر</title>
    
    <meta name="theme-color" content="#0a1a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="منصة وطنية للاقتصاد الأخضر - تبليغ عن المفرغات، فرز ذكي، وتتبع البصمة الكربونية">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50;
            --accent: #FF6F00; --accent-light: #FFA726;
            --danger: #E53935; --info: #1E88E5; --teal: #009688; --purple: #7B1FA2;
            --white: #FFFFFF; --text-gray: #90A4AE;
            --radius: 24px; --radius-sm: 14px;
            --shadow-xl: 0 30px 80px rgba(0,0,0,0.25);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-gray); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .bg-layer { position: fixed; top:0;left:0;width:100%;height:100%;z-index:0; background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .particle { position: fixed; border-radius: 50%; pointer-events: none; z-index:0; animation: floatUp linear infinite; opacity:0; }
        @keyframes floatUp { 0%{transform:translateY(110vh) scale(0);opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-10vh) scale(1.5);opacity:0;} }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index:0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width:400px;height:400px;background:rgba(46,125,50,0.12);top:-10%;right:-10%; }
        .orb-2 { width:300px;height:300px;background:rgba(255,111,0,0.08);bottom:-15%;left:-8%;animation-delay:-4s; }
        .orb-3 { width:200px;height:200px;background:rgba(30,136,229,0.06);top:50%;left:50%;animation-delay:-6s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(30px,-30px) scale(1.1);} 66%{transform:translate(-20px,20px) scale(0.9);} }
        .navbar { position:fixed; top:0;left:0;right:0;z-index:1000; background:rgba(10,31,10,0.85); backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-bottom:1px solid rgba(255,255,255,0.08); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 30px rgba(0,0,0,0.3); }
        .brand { display:flex; align-items:center; gap:10px; font-size:17px; font-weight:800; color:white; }
        .brand-icon { width:38px;height:38px; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 4px 16px rgba(46,125,50,0.5); animation:iconBounce 2s ease-in-out infinite; }
        @keyframes iconBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
        .nav-actions { display:flex; align-items:center; gap:8px; }
        .btn-share { font-size:11px; padding:7px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06); color:white; cursor:pointer; font-family:'Cairo',sans-serif; font-weight:600; transition:var(--transition); display:flex; align-items:center; gap:5px; }
        .btn-share:hover { background:rgba(255,255,255,0.14); }
        .btn-notif { font-size:11px; padding:7px 12px; border-radius:20px; border:1.5px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06); color:white; cursor:pointer; font-family:'Cairo',sans-serif; font-weight:600; transition:var(--transition); display:flex; align-items:center; gap:5px; text-decoration:none; position:relative; }
        .btn-notif:hover { background:rgba(255,255,255,0.14); }
        .notif-badge { position:absolute; top:-4px; left:-4px; width:16px; height:16px; background:var(--danger); border-radius:50%; font-size:9px; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .main { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; padding:82px 16px 30px; gap:20px; }
        .hero { width:100%; max-width:480px; background:rgba(255,255,255,0.94); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-radius:var(--radius); padding:32px 20px 24px; box-shadow:var(--shadow-xl); text-align:center; border:1px solid rgba(255,255,255,0.25); animation:fadeUp 0.8s ease both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(40px);} to{opacity:1;transform:translateY(0);} }

        /* شعار النيون الدوّار */
        .logo-wrapper { position: relative; display: inline-block; margin-bottom: 12px; width: 170px; height: 170px; }
        .logo-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border-radius: 50%; }
        .logo-ring.r1 { width: 95px; height: 95px; border: 2px solid rgba(76,175,80,0.5); animation: spinClock 10s linear infinite; box-shadow: 0 0 15px rgba(76,175,80,0.3), 0 0 30px rgba(76,175,80,0.1); }
        .logo-ring.r2 { width: 120px; height: 120px; border: 2px dashed rgba(255,152,0,0.45); animation: spinReverse 14s linear infinite; box-shadow: 0 0 15px rgba(255,152,0,0.25); }
        .logo-ring.r3 { width: 145px; height: 145px; border: 2px dotted rgba(30,136,229,0.4); animation: spinClock 18s linear infinite; box-shadow: 0 0 15px rgba(30,136,229,0.2); }
        .logo-ring.r4 { width: 168px; height: 168px; border: 1.5px solid rgba(123,31,162,0.3); animation: spinReverse 22s linear infinite; }
        @keyframes spinClock { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
        @keyframes spinReverse { from { transform: translate(-50%,-50%) rotate(360deg); } to { transform: translate(-50%,-50%) rotate(0deg); } }
        .hero-icon { font-size: 52px; animation: floatIcon 3s ease-in-out infinite; display: flex; align-items: center; justify-content: center; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; width: 60px; height: 60px; background: rgba(255,255,255,0.15); border-radius: 50%; backdrop-filter: blur(4px); }
        @keyframes floatIcon { 0%,100%{transform:translate(-50%,-50%) translateY(0);} 50%{transform:translate(-50%,-50%) translateY(-8px);} }

        .hero-title { font-size:30px; font-weight:900; background:linear-gradient(135deg,var(--primary-dark),var(--primary-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
        .hero-sub { font-size:13px; color:var(--text-gray); margin-bottom:6px; }
        .hero-badge { display:inline-block; background:rgba(46,125,50,0.08); color:var(--primary-dark); padding:4px 12px; border-radius:15px; font-size:10px; font-weight:700; margin-bottom:20px; }
        .btn-hero { display:block; width:100%; padding:15px; border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:800; cursor:pointer; font-family:'Cairo',sans-serif; color:white; text-decoration:none; transition:var(--transition); margin-bottom:8px; text-align:center; position:relative; overflow:hidden; }
        .btn-hero:hover { transform:translateY(-3px); box-shadow:0 14px 36px rgba(0,0,0,0.35); }
        .btn-hero:active { transform:translateY(0); }
        .btn-report { background:linear-gradient(135deg,#EF5350,#C62828); box-shadow:0 8px 24px rgba(198,40,40,0.35); font-size:16px; }
        .btn-schedule { background:linear-gradient(135deg,#1E88E5,#42A5F5); box-shadow:0 8px 24px rgba(30,136,229,0.35); }
        .btn-login { background:linear-gradient(135deg,var(--primary),var(--primary-light)); box-shadow:0 8px 24px rgba(46,125,50,0.35); }
        .btn-register { background:transparent; border:2px solid var(--primary); color:var(--primary-dark); }
        .btn-register:hover { background:rgba(46,125,50,0.06); }
        .hero-divider { display:flex; align-items:center; gap:10px; margin:16px 0; }
        .hero-divider::before,.hero-divider::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.08); }
        .hero-divider span { font-size:10px; color:var(--text-gray); font-weight:600; }
        .staff-card { width:100%; max-width:480px; background:rgba(255,255,255,0.06); backdrop-filter:blur(10px); border-radius:var(--radius); padding:16px; border:1px dashed rgba(255,255,255,0.1); text-align:center; animation:fadeUp 1s ease 0.2s both; }
        .staff-title { font-size:11px; color:rgba(255,255,255,0.4); font-weight:600; margin-bottom:10px; }
        .staff-btns { display:flex; gap:8px; }
        .btn-staff { flex:1; padding:12px; border-radius:var(--radius-sm); font-size:12px; font-weight:700; cursor:pointer; font-family:'Cairo',sans-serif; text-decoration:none; transition:var(--transition); text-align:center; color:white; }
        .btn-driver { background:rgba(30,136,229,0.3); border:1px solid rgba(30,136,229,0.4); }
        .btn-driver:hover { background:rgba(30,136,229,0.5); }
        .btn-admin { background:rgba(46,125,50,0.3); border:1px solid rgba(46,125,50,0.4); }
        .btn-admin:hover { background:rgba(46,125,50,0.5); }
        .footer { position:relative; z-index:1; text-align:center; padding:10px 16px; font-size:10px; color:rgba(255,255,255,0.5); background:linear-gradient(transparent,rgba(0,0,0,0.4)); display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
        .footer strong { color:rgba(255,255,255,0.8); }
        .sep { width:1px; height:12px; background:rgba(255,255,255,0.2); }
        @media (max-width:400px) { .hero-title { font-size:24px; } .hero-icon { font-size:40px; } .btn-hero { padding:13px; font-size:14px; } .staff-btns { flex-direction:column; } .logo-wrapper { width:140px; height:140px; } .logo-ring.r4 { width:138px;height:138px; } .logo-ring.r3 { width:118px;height:118px; } .logo-ring.r2 { width:98px;height:98px; } .logo-ring.r1 { width:78px;height:78px; } }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <header class="navbar">
        <div class="brand"><div class="brand-icon">🌍</div><span>مدينتنا نظيفة</span></div>
        <div class="nav-actions">
            <a href="notifications.html" class="btn-notif" id="notifBtn">🔔 الإشعارات</a>
            <button class="btn-share" onclick="sharePlatform()">📤 نشر</button>
        </div>
    </header>

    <main class="main">
        
        <div class="hero">
            <div class="logo-wrapper">
                <div class="logo-ring r1"></div>
                <div class="logo-ring r2"></div>
                <div class="logo-ring r3"></div>
                <div class="logo-ring r4"></div>
                <span class="hero-icon">♻️</span>
            </div>

            <h1 class="hero-title">مدينتنا نظيفة</h1>
            <p class="hero-sub">منصة وطنية للاقتصاد الأخضر</p>
            <span class="hero-badge">🇩🇿 ولاية برج بوعريريج</span>
            
            <a href="report.html" class="btn-hero btn-report">📸 أبلغ عن مفرغة</a>
            <a href="schedule.html" class="btn-hero btn-schedule">📅 جدول المواعيد</a>
            <a href="login.html" class="btn-hero btn-login">🔐 تسجيل الدخول</a>
            <a href="login.html" class="btn-hero btn-register" onclick="localStorage.setItem('showRegister','true')">📝 إنشاء حساب جديد</a>
            
            <div class="hero-divider"><span>أو</span></div>
            <p style="font-size:11px;color:var(--text-gray);">لديك حساب؟ <a href="login.html" style="color:var(--primary);font-weight:700;">سجل دخولك</a></p>
        </div>

        <div class="staff-card">
            <div class="staff-title">🔒 دخول الموظفين</div>
            <div class="staff-btns">
                <a href="driver.html" class="btn-staff btn-driver">🚛 واجهة السائق</a>
                <a href="dashboard.html" class="btn-staff btn-admin">📊 لوحة الإدارة</a>
            </div>
        </div>

    </main>

    <footer class="footer">
        <span>© 2026 <strong>مدينتنا نظيفة</strong></span><span class="sep"></span><span>🇩🇿 v1.0</span><span class="sep"></span><span>جميع الحقوق محفوظة</span>
    </footer>

    <script>
        (function(){var c=document.body;var colors=['#4CAF50','#81C784','#FFA726','#42A5F5','#AB47BC'];for(var i=0;i<35;i++){var p=document.createElement('div');p.className='particle';var s=Math.random()*5+2;p.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*10+10)+'s;animation-delay:'+Math.random()*8+'s;';c.appendChild(p);}})();
        function sharePlatform(){var u=window.location.href;if(navigator.share){navigator.share({title:'مدينتنا نظيفة',text:'منصة وطنية للاقتصاد الأخضر ♻️',url:u}).catch(function(){});}else{navigator.clipboard.writeText(u).then(function(){var b=document.querySelector('.btn-share');b.textContent='✅ تم النسخ';setTimeout(function(){b.textContent='📤 نشر';},2000);});}}

        // عداد الإشعارات غير المقروءة
        (function(){
            var xhr = new XMLHttpRequest();
            xhr.open('GET','https://ctkkkpcjwebkrcbzsvpf.supabase.co/rest/v1/notifications?select=count&is_read=eq.false',true);
            xhr.setRequestHeader('apikey','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc');
            xhr.onload = function(){
                if(xhr.status === 200){
                    var data = JSON.parse(xhr.responseText);
                    var count = data[0]?.count || 0;
                    if(count > 0){
                        var badge = document.createElement('span');
                        badge.className = 'notif-badge';
                        badge.textContent = count > 99 ? '99+' : count;
                        document.getElementById('notifBtn').appendChild(badge);
                    }
                }
            };
            xhr.send();
        })();
    </script>
</body>
</html>
