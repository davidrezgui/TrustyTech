<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | مدينتنا نظيفة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2E7D32; --primary-dark: #1B5E20; --primary-light: #4CAF50;
            --accent: #FF6F00; --accent-light: #FFA726; --danger: #E53935;
            --white: #FFFFFF; --text-gray: #90A4AE; --text-dark: #37474F;
            --radius: 24px; --radius-sm: 14px;
            --shadow-xl: 0 30px 80px rgba(0,0,0,0.25);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.2);
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a1a0a; min-height: 100vh; color: var(--text-dark); overflow-x: hidden; position: relative; display: flex; flex-direction: column; }
        .particles-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; background: linear-gradient(160deg, #0d260d 0%, #0a1f0a 30%, #061406 100%); }
        .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(110vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1.5); opacity: 0; } }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 350px; height: 350px; background: rgba(255,215,0,0.08); top: -8%; right: -8%; }
        .orb-2 { width: 300px; height: 300px; background: rgba(46,125,50,0.10); bottom: -12%; left: -6%; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(25px,-25px) scale(1.1); } 66% { transform: translate(-15px,15px) scale(0.9); } }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,31,10,0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 10px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 30px rgba(0,0,0,0.3); }
        .btn-back { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: var(--transition); text-decoration: none; }
        .btn-back:hover { background: rgba(255,255,255,0.12); }
        .nav-title { flex: 1; font-size: 16px; font-weight: 700; color: white; }
        .main-container { position: relative; z-index: 1; flex: 1; padding: 78px 16px 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .points-card { background: linear-gradient(135deg, #FFD700, #FFA726, #FF9800); border-radius: var(--radius); padding: 24px 18px; box-shadow: 0 12px 40px rgba(255,152,0,0.4); margin-bottom: 12px; text-align: center; color: white; animation: cardIn 0.5s ease both; position: relative; overflow: hidden; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .points-label { font-size: 13px; opacity: 0.9; }
        .points-value { font-size: 48px; font-weight: 900; direction: ltr; display: inline-block; margin: 4px 0; }
        .points-sub { font-size: 11px; opacity: 0.8; }
        .card { background: rgba(255,255,255,0.94); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius: var(--radius); padding: 20px 18px; box-shadow: var(--shadow-lg); margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2); animation: cardIn 0.5s ease both; }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .card-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
        .ci-rewards { background: #FFF8E1; } .ci-history { background: #E8F5E9; }
        .card-label { flex: 1; font-size: 14px; font-weight: 700; color: var(--text-dark); }
        .reward-list { display: flex; flex-direction: column; gap: 8px; }
        .reward-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.04); }
        .reward-icon { font-size: 30px; }
        .reward-info { flex: 1; }
        .reward-name { font-size: 13px; font-weight: 700; color: var(--text-dark); }
        .reward-cost { font-size: 11px; color: var(--accent); font-weight: 600; direction: ltr; }
        .reward-btn { padding: 8px 14px; border: none; border-radius: 15px; background: var(--accent); color: white; font-weight: 700; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 11px; }
        .history-list { display: flex; flex-direction: column; gap: 6px; }
        .history-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-radius: var(--radius-sm); background: rgba(0,0,0,0.02); font-size: 12px; }
        .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot-pickup { background: #FF9800; } .dot-report { background: #E53935; } .dot-reward { background: #4CAF50; }
        .history-info { flex: 1; }
        .history-points { font-weight: 700; direction: ltr; }
        .points-positive { color: #4CAF50; } .points-negative { color: #E53935; }
        .empty-state { text-align: center; padding: 20px; }
        .empty-emoji { font-size: 40px; display: block; margin-bottom: 6px; }
        .empty-text { font-size: 12px; color: var(--text-gray); }
        .footer { position: relative; z-index: 1; text-align: center; padding: 8px 20px; font-size: 9px; color: rgba(255,255,255,0.45); background: linear-gradient(transparent, rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

    <div class="particles-bg" id="particlesBg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="top-nav">
        <a href="index.html" class="btn-back">←</a>
        <span class="nav-title">👤 الملف الشخصي</span>
    </header>

    <main class="main-container">
        
        <div class="points-card">
            <div class="points-label">⭐ رصيد نقاطك</div>
            <div class="points-value" id="myPoints">0</div>
            <div class="points-sub">نقطة خضراء قابلة للاستبدال</div>
        </div>

        <div class="card">
            <div class="card-header"><div class="card-icon ci-rewards">🎁</div><span class="card-label">المكافآت المتاحة</span></div>
            <div class="reward-list">
                <div class="reward-item"><span class="reward-icon">🎫</span><div class="reward-info"><div class="reward-name">قسيمة تخفيض 500 دج</div><div class="reward-cost">500 نقطة</div></div><button class="reward-btn" onclick="redeem('قسيمة 500 دج',500)">استبدال</button></div>
                <div class="reward-item"><span class="reward-icon">🛍️</span><div class="reward-info"><div class="reward-name">كيس صديق للبيئة</div><div class="reward-cost">300 نقطة</div></div><button class="reward-btn" onclick="redeem('كيس صديق للبيئة',300)">استبدال</button></div>
                <div class="reward-item"><span class="reward-icon">🌳</span><div class="reward-info"><div class="reward-name">غرس شجرة باسمك</div><div class="reward-cost">200 نقطة</div></div><button class="reward-btn" onclick="redeem('غرس شجرة',200)">استبدال</button></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><div class="card-icon ci-history">📋</div><span class="card-label">سجل النشاط</span></div>
            <div class="history-list" id="historyList"><div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا يوجد نشاط حتى الآن</span></div></div>
        </div>

    </main>

    <footer class="footer">© 2026 مدينتنا نظيفة — جميع الحقوق محفوظة</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var sb = window.supabase.createClient('https://ctkkkpcjwebkrcbzsvpf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0a2trcGNqd2Via3JjYnpzdnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1Mzg0NzMsImV4cCI6MjA5MzExNDQ3M30.YB10D0463cSJ1Nm_Y9etMwwfEzn28s0OiN_mnQW5IMc');

        (function(){var c=document.getElementById('particlesBg');var colors=['#FFD700','#FFA726','#4CAF50','#81C784','#FFCC02'];for(var i=0;i<25;i++){var p=document.createElement('div');p.className='particle';var s=Math.random()*4+2;p.style.cssText='width:'+s+'px;height:'+s+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*8+8)+'s;animation-delay:'+Math.random()*6+'s;';c.appendChild(p);}})();

        var myPoints = 0;
        var allPickups = [];
        var history = [];

        async function loadData(){
            try{
                var r = await sb.from('pickups').select('*');
                if(!r.error) allPickups = r.data;
            }catch(e){}
            
            // حساب النقاط من Supabase
            myPoints = allPickups.reduce(function(s,x){return s+(x.points||0);},0);
            // إضافة النقاط المحلية
            myPoints += parseInt(localStorage.getItem('userPoints')||'0');
            
            // بناء السجل
            history = [];
            allPickups.forEach(function(x){
                var names = {carton:'كرتون',plastique:'بلاستيك',verre:'زجاج'};
                history.push({type:'pickup',desc:'طلب جمع '+names[x.material]+' ('+x.weight+' كغ)',points:x.points||0,time:x.created_at});
            });
            
            var localHistory = JSON.parse(localStorage.getItem('pointHistory')||'[]');
            history = history.concat(localHistory);
            history.sort(function(a,b){return new Date(b.time)-new Date(a.time);});
            
            updateDisplay();
        }

        function updateDisplay(){
            document.getElementById('myPoints').textContent = myPoints.toLocaleString('en-US');
            var hl = document.getElementById('historyList');
            if(history.length === 0){
                hl.innerHTML = '<div class="empty-state"><span class="empty-emoji">📭</span><span class="empty-text">لا يوجد نشاط حتى الآن</span></div>';
            } else {
                hl.innerHTML = history.slice(0,10).map(function(h){
                    var dotClass = h.type==='pickup'?'dot-pickup':(h.type==='report'?'dot-report':'dot-reward');
                    var pointsClass = h.points>0?'points-positive':'points-negative';
                    var sign = h.points>0?'+':'';
                    return '<div class="history-item"><span class="history-dot '+dotClass+'"></span><div class="history-info">'+h.desc+'</div><span class="history-points '+pointsClass+'">'+sign+h.points.toLocaleString('en-US')+'</span></div>';
                }).join('');
            }
        }

        function redeem(name,cost){
            if(myPoints >= cost){
                myPoints -= cost;
                localStorage.setItem('userPoints', myPoints.toString());
                var localHistory = JSON.parse(localStorage.getItem('pointHistory')||'[]');
                localHistory.push({type:'reward',desc:'استبدال: '+name,points:-cost,time:new Date().toISOString()});
                localStorage.setItem('pointHistory', JSON.stringify(localHistory));
                updateDisplay();
                alert('✅ تم استبدال '+name+' بنجاح!');
            } else {
                alert('❌ رصيدك غير كافي. تحتاج '+cost+' نقطة');
            }
        }

        loadData();
    </script>
</body>
</html>
